  <style>
    :root{
      --red:#e11d48;--red2:#9f1239;--glow:rgba(225,29,72,.28);
      --bg:#07070e;--bg2:#0e0e1b;--bg3:#141422;
      --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
      --txt:#e4e4f0;--txt2:#8888a6;--txt3:#44445a;
      --mono:'JetBrains Mono',monospace;--nav:60px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
    img{display:block;max-width:100%}
    button{font-family:'Outfit',sans-serif;cursor:pointer}
    a{color:inherit;text-decoration:none}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:#e11d4840;border-radius:2px}
    .nav{position:fixed;top:0;left:0;right:0;z-index:500;height:var(--nav);display:flex;align-items:center;gap:14px;padding:0 clamp(1rem,4vw,2.5rem);background:rgba(7,7,14,.96);backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid var(--border)}
    .logo{display:flex;align-items:center;gap:9px;flex-shrink:0;cursor:pointer}
    .logo-mark{width:30px;height:30px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,var(--red),var(--red2));display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px var(--glow)}
    .logo-name{font-size:clamp(13px,3.5vw,16px);font-weight:900;letter-spacing:-.025em;white-space:nowrap}
    .logo-name em{color:var(--red);font-style:normal}
    .nav-search{flex:1;min-width:0;position:relative}
    .nav-inp{width:100%;font-family:var(--mono);font-size:clamp(11px,2.5vw,13px);background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--txt);padding:8px 12px 8px 34px;border-radius:9px;outline:none;transition:border-color .2s,background .2s}
    .nav-inp:focus{border-color:rgba(225,29,72,.45);background:rgba(255,255,255,.07)}
    .nav-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--txt3);pointer-events:none}
    .search-drop{position:absolute;top:calc(100% + 8px);left:0;right:0;background:#12121f;border:1px solid var(--border2);border-radius:12px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.85);z-index:600;max-height:68vh;overflow-y:auto}
    .s-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
    .s-row:last-child{border-bottom:none}
    .s-row:hover,.s-row:active{background:rgba(255,255,255,.05)}
    .s-row img{width:36px;height:52px;border-radius:6px;object-fit:cover;flex-shrink:0}
    .s-title{font-weight:700;font-size:13px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .s-meta{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-top:2px}
    /* ═══ HERO ═══════════════════════════════════════════════════════════════ */
    .hero{position:relative;min-height:clamp(480px,85vh,780px);display:flex;align-items:flex-end;overflow:hidden}
    .hero-bg{position:absolute;inset:0;pointer-events:none;z-index:0;background:var(--bg)}
    .hero-progress{position:absolute;top:0;left:0;height:2px;background:linear-gradient(to right,var(--red),#ff6b8a);z-index:20;border-radius:0 2px 2px 0}

    /* ── Images ── */
    .hero-img-desk{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center center;filter:brightness(.65) saturate(1.2);transition:opacity .75s ease;image-rendering:high-quality}
    .hero-img-mob{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;filter:brightness(.7) saturate(1.1);transition:opacity .75s ease;display:none}
    @media(max-width:768px){
      .hero-img-desk{display:none}
      .hero-img-mob{display:block}
      .hero{min-height:clamp(320px,62vh,520px)}
    }

    /* ── Gradients ── */
    .hero-nav-fade{position:absolute;top:0;left:0;right:0;height:140px;background:linear-gradient(to bottom,rgba(7,7,14,.9) 0%,transparent 100%);pointer-events:none;z-index:2}
    .hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,14,.97) 0%,rgba(7,7,14,.6) 22%,rgba(7,7,14,.05) 55%,transparent 100%),linear-gradient(to right,rgba(7,7,14,.85) 0%,rgba(7,7,14,.05) 50%,transparent 100%);z-index:1}
    @media(max-width:768px){.hero-grad{display:none}}

    /* ── Desktop hero body (left-side text) ── */
    .hero-body{position:relative;z-index:5;padding:clamp(1rem,4vw,3rem) clamp(1rem,4vw,3.5rem) clamp(3.5rem,7vw,5.5rem);max-width:640px;width:100%;padding-left:clamp(80px,9vw,110px)}
    @media(max-width:768px){.hero-body{display:none}}
    .hero-badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--red);margin-bottom:12px}
    .hero-badge::before{content:'';display:block;width:14px;height:2px;background:var(--red);border-radius:1px}
    .hero-title{font-size:clamp(1.4rem,3.8vw,2.8rem);font-weight:900;line-height:1.08;letter-spacing:-.03em;color:#fff;margin-bottom:10px;text-shadow:0 2px 24px rgba(0,0,0,.5)}
    .hero-season-banner{display:inline-flex;align-items:center;gap:6px;background:rgba(225,29,72,.1);border:1px solid rgba(225,29,72,.22);color:#fb7185;padding:3px 9px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:700;margin-bottom:10px}
    .hero-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--txt2);margin-bottom:11px}
    .hero-score{color:#fbbf24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.18);padding:2px 7px;border-radius:4px;font-weight:700}
    .hero-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:13px}
    .htag{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.07em;padding:2px 7px;border-radius:4px;border:1px solid rgba(225,29,72,.25);color:#fb7185;background:rgba(225,29,72,.06)}
    .hero-desc{font-size:13px;line-height:1.75;color:rgba(228,228,240,.72);margin-bottom:20px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .hero-btns{display:flex;gap:9px;flex-wrap:wrap}
    .btn-play{display:inline-flex;align-items:center;gap:7px;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--red),var(--red2));box-shadow:0 4px 20px var(--glow);border:none;transition:transform .15s,box-shadow .2s,filter .15s;-webkit-tap-highlight-color:transparent}
    .btn-play:hover{filter:brightness(1.12);box-shadow:0 6px 30px var(--glow)}
    .btn-play:active{transform:scale(.96)}
    .btn-info{display:inline-flex;align-items:center;gap:7px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;color:var(--txt);background:rgba(255,255,255,.09);border:1px solid var(--border2);-webkit-tap-highlight-color:transparent;transition:background .15s}
    .btn-info:hover{background:rgba(255,255,255,.15)}
    .btn-info:active{background:rgba(255,255,255,.18)}

    /* ── Desktop arrows — vertically centered, far edges ── */
    .harr{position:absolute;top:50%;transform:translateY(-50%);z-index:30;width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.22);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(14px) saturate(160%);box-shadow:0 4px 24px rgba(0,0,0,.6);transition:background .2s,border-color .2s,box-shadow .2s,transform .18s;cursor:pointer;pointer-events:all;user-select:none}
    .harr:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.4);box-shadow:0 6px 32px rgba(0,0,0,.75);transform:translateY(-50%) scale(1.1)}
    .harr:active{transform:translateY(-50%) scale(.9);background:rgba(255,255,255,.22)}
    .harr-l{left:16px}
    .harr-r{right:16px}
    @media(max-width:768px){.harr{display:none}}

    /* ── Dots — desktop only ── */
    .hdots{position:absolute;bottom:1.4rem;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:5px;z-index:10;background:rgba(0,0,0,.28);backdrop-filter:blur(10px);padding:5px 10px;border-radius:20px}
    .hdot{height:4px;border-radius:3px;background:rgba(255,255,255,.26);border:none;cursor:pointer;transition:width .35s cubic-bezier(.4,0,.2,1),background .3s;flex-shrink:0}
    .hdot.on{background:var(--red);width:20px!important}
    @media(max-width:768px){.hdots{display:none}}

    /* ═══ MOBILE BOTTOM BAR ═══════════════════════════════════════════════════ */
    .hmob{display:none;position:absolute;bottom:0;left:0;right:0;z-index:10;padding:14px 14px 20px;backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);background:linear-gradient(to top,rgba(5,5,12,.82) 0%,rgba(5,5,12,.55) 70%,transparent 100%);align-items:flex-end;gap:10px}
    @media(max-width:768px){.hmob{display:flex}}

    /* Prev thumbnail — small vertical strip, low opacity */
    .hmob-prev{width:34px;height:52px;border-radius:7px;overflow:hidden;flex-shrink:0;opacity:.45;border:1px solid rgba(255,255,255,.14);cursor:pointer;transition:opacity .22s,transform .22s;align-self:flex-end;margin-bottom:2px}
    .hmob-prev:active{opacity:.75;transform:scale(.94)}
    .hmob-prev img{width:100%;height:100%;object-fit:cover;display:block}

    /* Center info block */
    .hmob-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;align-self:flex-end}
    .hmob-title{font-size:15px;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em;text-shadow:0 1px 8px rgba(0,0,0,.6)}
    .hmob-row{display:flex;align-items:center;gap:8px}
    .hmob-year{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.55);font-weight:600;letter-spacing:.04em}
    .hmob-dot-sep{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0}
    .hmob-genre{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.45)}

    /* Green play button */
    .hmob-play{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:22px;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;font-size:12px;font-weight:800;border:none;cursor:pointer;flex-shrink:0;align-self:flex-end;transition:filter .15s,transform .15s,box-shadow .15s;box-shadow:0 3px 14px var(--glow);-webkit-tap-highlight-color:transparent;letter-spacing:.01em}
    .hmob-play:hover{filter:brightness(1.12);box-shadow:0 4px 22px var(--glow)}
    .hmob-play:active{transform:scale(.94)}

    /* Next slide preview card */
    .hmob-next{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:11px;padding:7px 9px;cursor:pointer;flex-shrink:0;max-width:120px;min-width:100px;transition:background .2s,transform .2s,box-shadow .2s;align-self:flex-end;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 12px rgba(0,0,0,.3)}
    .hmob-next:active{transform:scale(.95);background:rgba(255,255,255,.18)}
    .hmob-next-img{width:32px;height:50px;border-radius:6px;object-fit:cover;flex-shrink:0;display:block}
    .hmob-next-info{min-width:0;flex:1}
    .hmob-next-label{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.42);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
    .hmob-next-title{font-size:10px;font-weight:800;color:#fff;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
    .hmob-next-chevron{font-size:13px;color:rgba(255,255,255,.5);flex-shrink:0;margin-left:2px}

    .tabs-bar{display:flex;gap:5px;overflow-x:auto;padding:clamp(.6rem,2vw,1rem) clamp(.75rem,3.5vw,2.5rem);scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .tabs-bar::-webkit-scrollbar{display:none}
    .tbtn{font-family:var(--mono);font-size:clamp(11px,2vw,12px);font-weight:700;padding:clamp(6px,1.8vw,8px) clamp(13px,2.5vw,17px);border-radius:8px;flex-shrink:0;border:1px solid;transition:all .15s;-webkit-tap-highlight-color:transparent}
    .tbtn.off{border-color:var(--border);background:rgba(255,255,255,.04);color:var(--txt2)}
    .tbtn.off:hover{background:rgba(255,255,255,.07);color:var(--txt)}
    .tbtn.on{border-color:transparent;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;box-shadow:0 3px 14px var(--glow)}
    .section{padding:0 clamp(.75rem,3.5vw,2.5rem) clamp(1rem,3vw,2.5rem)}
    .sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:clamp(.9rem,2.5vw,1.3rem)}
    .sec-bar{width:3px;height:18px;border-radius:2px;background:linear-gradient(to bottom,var(--red),var(--red2));flex-shrink:0}
    .sec-title{font-size:clamp(.95rem,3vw,1.1rem);font-weight:800;letter-spacing:-.02em;color:#fff}
    .agrid{display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(7px,1.8vw,13px)}
    @media(min-width:480px){.agrid{grid-template-columns:repeat(3,1fr)}}
    @media(min-width:680px){.agrid{grid-template-columns:repeat(4,1fr)}}
    @media(min-width:900px){.agrid{grid-template-columns:repeat(5,1fr)}}
    @media(min-width:1200px){.agrid{grid-template-columns:repeat(6,1fr)}}
    .acard{cursor:pointer;border-radius:10px;overflow:hidden;background:var(--bg2);border:1px solid var(--border);-webkit-tap-highlight-color:transparent;transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s,border-color .22s}
    @media(hover:hover){.acard:hover{transform:translateY(-5px) scale(1.015);box-shadow:0 16px 36px rgba(0,0,0,.55);border-color:rgba(255,255,255,.14)}.acard:hover .acard-img{transform:scale(1.05)}.acard:hover .acard-play{opacity:1}}
    .acard:active{transform:scale(.97)}
    .acard-top{position:relative;overflow:hidden;padding-top:140%;background:#131328;border-radius:10px 10px 0 0}

    .atag{font-family:var(--mono);font-size:clamp(7px,1.5vw,9px);text-transform:uppercase;letter-spacing:.05em;padding:2px 5px;border-radius:4px;border:1px solid rgba(225,29,72,.2);color:#fb7185;background:rgba(225,29,72,.05);white-space:nowrap}

    @media(max-width:360px){.acard-tags{display:none}}
    .sk{background:linear-gradient(90deg,#1a1a2e 25%,#20203a 50%,#1a1a2e 75%);background-size:200% 100%;animation:shimmer 1.7s infinite;border-radius:10px;padding-top:140%}

    .pag{display:flex;justify-content:center;align-items:center;gap:clamp(4px,1.2vw,6px);padding:clamp(.7rem,2.5vw,1rem) clamp(1rem,4vw,2.5rem) clamp(1.2rem,3.5vw,2.5rem);flex-wrap:wrap}
    .pgb{min-width:clamp(30px,7vw,35px);height:clamp(30px,7vw,35px);padding:0 7px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:clamp(10px,2vw,12px);font-weight:700;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--txt2);transition:all .15s;-webkit-tap-highlight-color:transparent}

    .pgb:disabled{opacity:.2;cursor:default}
    /* WATCH */
    .wp{min-height:100vh;background:var(--bg);padding-top:var(--nav)}
    .wp-wrap{max-width:1440px;margin:0 auto;padding:0 clamp(1rem,4vw,2rem) 4rem}
    .wp-back{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:clamp(10px,2vw,11px);color:var(--txt2);background:none;border:none;padding:clamp(.7rem,2.5vw,1rem) 0;transition:color .15s;-webkit-tap-highlight-color:transparent}
    .wp-back:hover{color:var(--txt)}
    .wp-layout{display:grid;grid-template-columns:1fr;gap:14px}
    @media(min-width:960px){.wp-layout{grid-template-columns:1fr 320px}}
    .player-wrap{background:#000;border-radius:clamp(10px,2vw,14px);overflow:hidden;aspect-ratio:16/9;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.7);margin-bottom:12px;width:100%}
    .player-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block;max-width:100%}
    @media(max-width:768px){.player-wrap{border-radius:10px;margin-left:-0px;margin-right:0px}}
    .player-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#08081a;z-index:2;pointer-events:none}
    .spin-ring{width:46px;height:46px;border-radius:50%;border:3px solid rgba(225,29,72,.12);border-top-color:var(--red);animation:spin .85s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin-txt{font-family:var(--mono);font-size:clamp(10px,2vw,11px);color:var(--txt3);text-align:center}
    .vtabs{display:flex;gap:6px;margin-bottom:11px}
    .vtab{font-family:var(--mono);font-size:clamp(10px,2vw,11px);font-weight:700;padding:clamp(6px,1.8vw,8px) clamp(13px,2.5vw,17px);border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--txt2);transition:all .15s;-webkit-tap-highlight-color:transparent}
    .vtab:hover{background:rgba(255,255,255,.08);color:var(--txt)}
    .vtab.on{background:linear-gradient(135deg,var(--red),var(--red2));border-color:transparent;color:#fff;box-shadow:0 3px 12px var(--glow)}
    .srv-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:clamp(11px,2.5vw,15px);margin-bottom:12px}
    .srv-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:7px}
    .srv-label{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.12em}
    .lang-pills{display:flex;gap:5px}
    .lpill{font-family:var(--mono);font-size:clamp(9px,2vw,10px);font-weight:700;padding:4px 11px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--txt3);transition:all .15s;-webkit-tap-highlight-color:transparent}
    .lpill:hover{background:rgba(255,255,255,.08);color:var(--txt)}
    .lpill.on{background:rgba(225,29,72,.16);border-color:rgba(225,29,72,.38);color:#fb7185}
    .srv-btns{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
    .sbtn{font-family:var(--mono);font-size:clamp(10px,2vw,11px);font-weight:700;padding:clamp(6px,1.8vw,8px) clamp(10px,2.5vw,14px);border-radius:7px;min-width:clamp(34px,7vw,42px);border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--txt2);transition:all .15s;-webkit-tap-highlight-color:transparent}
    .sbtn:hover{background:rgba(255,255,255,.08);color:var(--txt)}
    .sbtn.on{background:linear-gradient(135deg,var(--red),var(--red2));border-color:transparent;color:#fff;box-shadow:0 2px 10px var(--glow)}
    @media(max-width:480px){.sbtn{min-width:32px;padding:6px 10px;font-size:10px}}
    .srv-hint{font-family:var(--mono);font-size:10px;color:var(--txt3);line-height:1.5}
    .srv-hint span{color:var(--txt2)}
    .winfo{margin-bottom:16px}
    .winfo-title{font-size:clamp(1.1rem,3.5vw,1.4rem);font-weight:900;letter-spacing:-.025em;color:#fff;margin-bottom:7px;line-height:1.15}
    .winfo-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:9px;font-family:var(--mono);font-size:clamp(9px,2vw,10px);color:var(--txt2)}
    .ep-pill{background:rgba(225,29,72,.12);border:1px solid rgba(225,29,72,.28);color:#fb7185;padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:clamp(9px,2vw,10px);font-weight:700}
    .winfo-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
    .winfo-desc{font-size:clamp(12px,2.5vw,13px);line-height:1.75;color:var(--txt2);display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px}
    .ext-links{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .ext-link{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:4px 10px;border-radius:6px;border:1px solid var(--border2);color:var(--txt2);background:rgba(255,255,255,.04);transition:all .15s;-webkit-tap-highlight-color:transparent}
    .ext-link:hover{background:rgba(255,255,255,.09);color:var(--txt);border-color:rgba(255,255,255,.2)}
    .stars{display:inline-flex;gap:2px}
    /* EPISODE PANEL */
    .ep-panel{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:14px;display:flex;flex-direction:column;gap:10px}
    @media(min-width:960px){.ep-panel{position:sticky;top:calc(var(--nav) + 10px);max-height:calc(100vh - var(--nav) - 22px)}}
    .ep-panel-hdr{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .ep-panel-title{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.12em}
    .ep-filter{font-family:var(--mono);font-size:clamp(10px,2vw,11px);background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--txt);padding:7px 10px;border-radius:7px;width:100%;outline:none;flex-shrink:0;transition:border-color .2s}
    .ep-filter:focus{border-color:rgba(225,29,72,.45)}
    .ep-scroll{overflow-y:auto;flex:1;max-height:clamp(280px,42vh,520px)}
    @media(min-width:960px){.ep-scroll{max-height:none}}
    .ep-scroll::-webkit-scrollbar{width:3px}
    .ep-scroll::-webkit-scrollbar-thumb{background:rgba(225,29,72,.2);border-radius:2px}
    /* LIST VIEW */
    .ep-list{display:flex;flex-direction:column;gap:5px;padding:2px}
    .epbtn{display:flex;align-items:center;gap:11px;padding:clamp(9px,2vw,11px) clamp(10px,2vw,13px);border-radius:9px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);cursor:pointer;text-align:left;width:100%;transition:background .2s,border-color .2s,transform .18s,box-shadow .2s;-webkit-tap-highlight-color:transparent}
    .epbtn:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);transform:translateX(3px);box-shadow:0 3px 14px rgba(0,0,0,.35)}
    .epbtn:active{transform:scale(.98)}
    .epbtn.on{background:rgba(225,29,72,.12);border-color:rgba(225,29,72,.3);box-shadow:0 0 0 1px rgba(225,29,72,.15) inset}
    .epbtn.on:hover{background:rgba(225,29,72,.18);border-color:rgba(225,29,72,.45)}
    .ep-num{font-family:var(--mono);font-size:clamp(9px,2vw,10px);font-weight:800;color:var(--red);min-width:clamp(30px,5vw,36px);flex-shrink:0;letter-spacing:.04em}
    .ep-name{font-size:clamp(11px,2vw,12.5px);color:var(--txt);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35}
    /* POLICY */
    .policy-wrap{min-height:100vh;background:var(--bg);padding-top:var(--nav)}
    .policy-inner{max-width:740px;margin:0 auto;padding:0 clamp(1rem,4vw,2.5rem) 4rem}
    .policy-back{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:clamp(10px,2vw,11px);color:var(--txt2);background:none;border:none;cursor:pointer;padding:clamp(.7rem,2.5vw,1rem) 0 clamp(.7rem,2.5vw,1.2rem);transition:color .15s;-webkit-tap-highlight-color:transparent}
    .policy-back:hover{color:var(--txt)}
    .policy-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:clamp(1.4rem,5vw,2.5rem)}
    .policy-h1{font-size:clamp(1.3rem,4vw,1.85rem);font-weight:900;letter-spacing:-.03em;color:#fff;margin-bottom:.4rem;line-height:1.1}
    .policy-date{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-bottom:2rem}
    .policy-section{margin-bottom:1.6rem}
    .policy-h2{font-size:.9rem;font-weight:700;color:var(--txt);margin-bottom:.5rem}
    .policy-p{font-size:13px;line-height:1.8;color:var(--txt2)}
    .policy-ul{font-size:13px;line-height:2;color:var(--txt2);padding-left:1.4rem;margin-top:.4rem}
    .contact-box{margin-top:1rem;display:flex;gap:12px}
    .contact-link{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:14px;transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s,background .18s,border-color .18s;-webkit-tap-highlight-color:transparent}
    .contact-link-email{background:rgba(225,29,72,.1);border:1px solid rgba(225,29,72,.28);color:#fb7185}
    .contact-link-email:hover{background:rgba(225,29,72,.22);border-color:rgba(225,29,72,.6);transform:translateY(-4px) scale(1.1);box-shadow:0 8px 28px rgba(225,29,72,.35)}
    .contact-link-email:active{transform:scale(.95)}
    .contact-link-wa{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.28);color:#4ade80}
    .contact-link-wa:hover{background:rgba(37,211,102,.22);border-color:rgba(37,211,102,.6);transform:translateY(-4px) scale(1.1);box-shadow:0 8px 28px rgba(37,211,102,.25)}
    .contact-link-wa:active{transform:scale(.95)}
    .contact-icon{width:22px;height:22px;flex-shrink:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
    .contact-link:hover .contact-icon{transform:scale(1.15) rotate(-6deg)}
    footer{border-top:1px solid var(--border);padding:clamp(1.1rem,3.5vw,1.8rem) clamp(1rem,4vw,2.5rem);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
    .ft-logo{font-size:clamp(12px,2.5vw,14px);font-weight:900;letter-spacing:-.02em}
    .ft-logo em{color:var(--red);font-style:normal}
    .ft-links{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .ft-link{font-family:var(--mono);font-size:clamp(9px,1.8vw,10px);color:var(--txt2);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:0;transition:color .15s}
    .ft-link:hover{color:var(--txt)}
    .ft-sep{font-family:var(--mono);font-size:10px;color:var(--txt3)}
    @media(max-width:480px){footer{padding:1rem .75rem;flex-direction:column;gap:.5rem}.ft-links{justify-content:flex-start}.nav{gap:8px;padding:0 .85rem}.pag{gap:4px;padding:.7rem .75rem 2rem}.pgb{min-width:28px;height:28px;font-size:10px}.wp-wrap{padding:0 .75rem 3rem}}
    @media(max-width:380px){.logo-name{font-size:12px}.logo-mark{width:26px;height:26px}}

    /* ════ FEATURE CSS ════════════════════════════════════════════════════ */

    /* Toast */
    .toast-wrap{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
    .toast{background:rgba(14,14,27,.97);border:1px solid rgba(255,255,255,.12);color:#fff;font-family:var(--mono);font-size:12px;font-weight:600;padding:10px 20px;border-radius:22px;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.6);white-space:nowrap;animation:toastIn .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
    .toast.out{animation:toastOut .3s ease forwards}
    @keyframes toastIn{from{opacity:0;transform:translateY(14px) scale(.88)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes toastOut{to{opacity:0;transform:translateY(6px) scale(.93)}}

    /* Back to top */
    .btt{position:fixed;bottom:32px;right:22px;z-index:800;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red2));border:none;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px var(--glow),0 2px 8px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s,box-shadow .2s;transform:translateY(16px) scale(.85)}
    .btt.vis{opacity:1;pointer-events:all;transform:translateY(0) scale(1)}
    .btt:hover{box-shadow:0 6px 28px var(--glow);filter:brightness(1.15);transform:translateY(-2px) scale(1.08)!important}
    .btt:active{transform:scale(.92)!important}

    /* Genre pills — scrollable single row, premium */
    .genre-wrap{padding:0 clamp(.75rem,3.5vw,2.5rem) clamp(.5rem,1.5vw,.9rem);position:relative}
    .genre-wrap::after{content:'';position:absolute;right:0;top:0;bottom:0;width:40px;background:linear-gradient(to right,transparent,var(--bg));pointer-events:none}
    .genre-bar{display:flex;gap:7px;overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .genre-bar::-webkit-scrollbar{display:none}
    .gpill{font-family:var(--mono);font-size:11px;font-weight:700;padding:6px 16px;border-radius:20px;flex-shrink:0;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--txt2);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;letter-spacing:.02em;user-select:none;white-space:nowrap}
    .gpill:hover{background:rgba(255,255,255,.1);color:var(--txt);border-color:rgba(255,255,255,.22);transform:translateY(-1px)}
    .gpill.on{background:linear-gradient(135deg,var(--red),var(--red2));border-color:transparent;color:#fff;box-shadow:0 3px 14px var(--glow);transform:translateY(-1px)}

    /* Empty state */
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1rem;gap:14px;text-align:center}
    .empty-ico{font-size:3rem;opacity:.35}
    .empty-title{font-size:1.1rem;font-weight:800;color:var(--txt);letter-spacing:-.02em}
    .empty-sub{font-size:13px;color:var(--txt2);max-width:280px;line-height:1.6}
    .empty-btn{margin-top:4px;padding:9px 22px;border-radius:9px;background:rgba(255,255,255,.07);border:1px solid var(--border2);color:var(--txt2);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--mono);transition:all .15s}
    .empty-btn:hover{background:rgba(255,255,255,.12);color:var(--txt)}

    /* Search results */
    .srp{padding-top:calc(var(--nav) + .75rem)}
    .srp-hdr{display:flex;align-items:center;gap:10px;padding:0 clamp(.75rem,3.5vw,2.5rem) clamp(.7rem,2vw,1.1rem)}
    .srp-q{font-size:clamp(.95rem,3vw,1.1rem);font-weight:800;color:#fff;letter-spacing:-.02em}
    .srp-q em{color:var(--red);font-style:normal}
    .srp-count{font-family:var(--mono);font-size:11px;color:var(--txt3);margin-left:4px}

    /* Continue Watching — compact, zoom+play hover */
    .cw-section{padding:0 clamp(.75rem,3.5vw,2.5rem) clamp(.6rem,1.5vw,.9rem)}
    .cw-scroll{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .cw-scroll::-webkit-scrollbar{display:none}
    .cw-card{flex-shrink:0;width:clamp(88px,19vw,112px);cursor:pointer;border-radius:9px;overflow:hidden;background:var(--bg2);border:1px solid var(--border);position:relative;transition:transform .28s cubic-bezier(.34,1.4,.64,1),box-shadow .28s,border-color .25s;-webkit-tap-highlight-color:transparent}
    .cw-card:hover{transform:translateY(-7px) scale(1.05);box-shadow:0 18px 40px rgba(0,0,0,.65);border-color:rgba(255,255,255,.2)}
    .cw-card:active{transform:scale(.96)}
    .cw-img-wrap{position:relative;padding-top:142%;background:#131328;overflow:hidden}
    .cw-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .38s cubic-bezier(.4,0,.2,1)}
    .cw-card:hover .cw-img{transform:scale(1.12)}
    .cw-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.15) 55%,transparent 100%)}
    .cw-play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .22s;background:rgba(0,0,0,.18)}
    .cw-remove{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;line-height:1;padding:0;transition:background .15s,transform .15s;-webkit-tap-highlight-color:transparent}
    .cw-remove:hover{background:var(--red);transform:scale(1.15)}
    .cw-remove:active{transform:scale(.88)}
    @media(hover:none){.cw-remove{opacity:.8}}

async function gql(query, vars={}) {
  const r = await fetch('https://graphql.anilist.co', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({query, variables:vars})
  });
  return r.json();
}

const FL = `id idMal siteUrl title{romaji english}coverImage{extraLarge large color}bannerImage
  description(asHtml:false)averageScore episodes status nextAiringEpisode{episode timeUntilAiring}
  seasonYear season format genres trailer{id site} duration`;
const FD = `${FL} streamingEpisodes{title thumbnail url site}`;

const Qs = {
  trending:`query($p:Int){Page(page:$p,perPage:30){pageInfo{lastPage}media(type:ANIME,sort:TRENDING_DESC,isAdult:false){${FL}}}}`,
  popular: `query($p:Int){Page(page:$p,perPage:30){pageInfo{lastPage}media(type:ANIME,sort:POPULARITY_DESC,isAdult:false){${FL}}}}`,
  top:     `query($p:Int){Page(page:$p,perPage:30){pageInfo{lastPage}media(type:ANIME,sort:SCORE_DESC,isAdult:false){${FL}}}}`,
  airing:  `query($p:Int){Page(page:$p,perPage:30){pageInfo{lastPage}media(type:ANIME,status:RELEASING,sort:TRENDING_DESC,isAdult:false){${FL}}}}`,
  search:  `query($s:String){Page(perPage:14){media(search:$s,type:ANIME,isAdult:false){${FL}}}}`,
  detail:   `query($id:Int){Media(id:$id,type:ANIME){${FD}}}`,
  schedule: `query($from:Int,$to:Int){Page(perPage:50){airingSchedules(airingAt_greater:$from,airingAt_lesser:$to,sort:TIME){airingAt episode media{${FL}}}}}`,
};

function mapA(a) {
  const seasonName = a.season
    ? a.season.charAt(0) + a.season.slice(1).toLowerCase() + ' ' + a.seasonYear
    : (a.seasonYear||'');
  const airedEps = a.nextAiringEpisode ? a.nextAiringEpisode.episode - 1 : (a.episodes||null);
  const nextEp   = a.nextAiringEpisode ? a.nextAiringEpisode.episode : null;
  const timeUntilAiring = a.nextAiringEpisode ? a.nextAiringEpisode.timeUntilAiring : null;
  const duration = a.duration ? `${a.duration}m` : null;
  let trailerUrl = null;
  const overrideYtId = TRAILER_OVERRIDE[a.id];
  if (overrideYtId) {
    trailerUrl = `https://www.youtube.com/embed/${overrideYtId}?rel=0&modestbranding=1`;
  } else if (a.trailer?.id) {
    trailerUrl = a.trailer.site==='youtube'
      ? `https://www.youtube.com/embed/${a.trailer.id}?rel=0&modestbranding=1`
      : a.trailer.site==='dailymotion'
      ? `https://www.dailymotion.com/embed/video/${a.trailer.id}` : null;
  }
  const rawDesc = (a.description||'').replace(/<[^>]+>/g,'').trim();
  const stubPattern = /^(the\s+)?(first|second|third|fourth|fifth|sixth|seventh|eighth|\d+(st|nd|rd|th))\s+(season|cour|part|cours)\s+of/i;
  const shortStub   = rawDesc.length < 120;
  const isSequel    = /^(sequel|continuation|second|third|fourth|part\s*\d|season\s*\d|cour\s*\d)/i.test(rawDesc);
  const descIsStub  = shortStub || stubPattern.test(rawDesc) || isSequel;
  return {
    id: a.id, malId: a.idMal, siteUrl: a.siteUrl||null,
    title: a.title?.english||a.title?.romaji||'Unknown',
    romaji: a.title?.romaji||'',
    image: a.coverImage?.extraLarge||a.coverImage?.large,
    banner: a.bannerImage,
    desc: rawDesc,
    descIsStub,
    rating: a.averageScore, year: a.seasonYear,
    eps: a.episodes, airedEps,
    genres: a.genres||[],
    color: a.coverImage?.color||'#e11d48',
    format: (a.format||'TV').replace(/_/g,' '),
    season: seasonName, trailerUrl, status: a.status,
    nextEp, timeUntilAiring, duration,
  };
}

function buildServers(aniId, ep, lang, malId) {
  const e   = ep   || 1;
  const L   = lang === 'dub' ? 'dub' : 'sub';
  const list = [
    { n:'1', url:`https://vidnest.fun/animepahe/${aniId}/${e}/${L}` },
  ];
  if (malId) {
    list.push(
      { n:'2',  url:`https://vidsrc.xyz/embed/anime?mal=${malId}&ep=${e}` },
      { n:'3',  url:`https://vidsrc.to/embed/anime/${malId}/${e}` },
      { n:'4',  url:`https://vidsrc.me/embed/anime?mal=${malId}&ep=${e}` },
      { n:'5',  url:`https://embed.su/embed/anime/${malId}/${e}` },
      { n:'6',  url:`https://www.2embed.cc/embedanime/${malId}?ep=${e}` },
      { n:'7',  url:`https://player.smashy.stream/anime/${malId}?ep=${e}` },
    );
  }
  return list;
}

function Hero({items, onPlay}) {
  const IV = 10000;
  const [idx,setIdx]     = useState(0);
  const [loaded,setLoad] = useState(false);
  const [prog,setProg]   = useState(0);
  const descCache = useRef({});
  const [extraDesc, setExtraDesc] = useState('');
  const pv = useRef(null), pr = useRef(0), tx = useRef(null), ty = useRef(null), fi = useRef(true);
  const CAP = Math.min(items.length, 8);
  // Functional updates — never reads stale idx from closure
  const prev = useCallback(() => {
    const h = Math.min(items.length, 8);
    setIdx(i => (i - 1 + h) % h);
  }, [items.length]);
  const next = useCallback(() => {
    const h = Math.min(items.length, 8);
    setIdx(i => (i + 1) % h);
  }, [items.length]);
  const go = useCallback(i => setIdx(i), []);
  const start = () => {
    clearInterval(pv.current); pr.current = 0; setProg(0);
    pv.current = setInterval(() => {
      pr.current += 50; setProg(pr.current);
      if (pr.current >= IV) {
        pr.current = 0; setProg(0);
        setIdx(i => (i + 1) % Math.min(items.length, 8));
        setLoad(false);
      }
    }, 50);
  };
  useEffect(() => { if (items.length) start(); return () => clearInterval(pv.current); }, [items]);
  useEffect(() => {
    setLoad(false); setExtraDesc('');
    if (fi.current) { fi.current = false; return; }
    start();
  }, [idx]);
  useEffect(() => {
    if (!items.length) return;
    const a = items[idx];
    if (!a?.descIsStub || !a?.malId) return;
    const key = String(a.malId);
    if (descCache.current[key]) { setExtraDesc(descCache.current[key]); return; }
    (async () => {
      try {
        const r = await fetch(`https://api.jikan.moe/v4/anime/${a.malId}`);
        const d = await r.json();
        const synopsis = d.data?.synopsis || '';
        descCache.current[key] = synopsis;
        setExtraDesc(synopsis);
      } catch(e) {}
    })();
  }, [idx, items]);

  const onTS = e => { tx.current = e.touches[0].clientX; ty.current = e.touches[0].clientY; };
  const onTE = e => {
    if (tx.current === null) return;
    const dx = e.changedTouches[0].clientX - tx.current, dy = Math.abs(e.changedTouches[0].clientY - ty.current);
    if (Math.abs(dx) > 44 && Math.abs(dx) > dy * 1.5) dx < 0 ? next() : prev();
    tx.current = null; ty.current = null;
  };

  if (!items.length) return <div style={{minHeight:'100vh',background:'var(--bg)'}}/>;
  const h = CAP;
  const a        = items[idx];
  const prevItem = items[(idx - 1 + h) % h];
  const nextItem = items[(idx + 1) % h];

  return (
    <div className="hero" onTouchStart={onTS} onTouchEnd={onTE}>
      <div className="hero-bg">
        <div className="hero-progress" style={{width:Math.min((prog/IV)*100,100)+'%'}}/>
        {/* Desktop banner image */}
        <img className="hero-img-desk" key={'d-'+a.id} src={a.banner||a.image} alt=""
          fetchpriority="high" loading="eager"
          style={{opacity:loaded?1:0}} onLoad={()=>setLoad(true)} onError={()=>setLoad(true)}/>
        {/* Mobile portrait image */}
        <img className="hero-img-mob" key={'m-'+a.id} src={a.image} alt=""
          fetchpriority="high" loading="eager"
          style={{opacity:loaded?1:0}} onLoad={()=>setLoad(true)} onError={()=>setLoad(true)}/>
        <div className="hero-grad"/>
        <div className="hero-nav-fade"/>
      </div>

      {/* ── Desktop: full info left-side body ── */}
      <div className="hero-body">
        <div className="hero-badge">Trending Now</div>
        <h1 className="hero-title">{a.title}</h1>
        {a.season && <div className="hero-season-banner">📅 {a.season} · {a.format}</div>}
        <div className="hero-meta">
          {a.rating && <span className="hero-score">★ {a.rating}%</span>}
          {a.airedEps && <span>{a.airedEps} Episodes</span>}
        </div>
        <div className="hero-tags">{a.genres.slice(0,5).map(g=><span key={g} className="htag">{g}</span>)}</div>
        <p className="hero-desc">{(a.descIsStub && extraDesc) ? extraDesc : a.desc}</p>
        <div className="hero-btns">
          <button className="btn-play" onClick={()=>onPlay(a,'watch')}><PIco s={13}/>Play</button>
          {a.trailerUrl && <button className="btn-info" onClick={()=>onPlay(a,'trailer')}><FilmIco/> Trailer</button>}
        </div>
      </div>

      {/* ── Desktop: vertically-centered chevron arrows ── */}
      <button className="harr harr-l" onClick={prev} aria-label="Previous"><HeroChevL/></button>
      <button className="harr harr-r" onClick={next} aria-label="Next"><HeroChevR/></button>

      {/* ── Desktop: progress dots ── */}
      <div className="hdots">
        {Array.from({length:h}).map((_,i)=>(
          <button key={i} className={'hdot'+(i===idx?' on':'')} style={{width:i===idx?20:5}} onClick={()=>go(i)}/>
        ))}
      </div>

      {/* ══ MOBILE BOTTOM BAR ═════════════════════════════════════════════════ */}
      <div className="hmob">
        {/* Prev slide thumbnail — bottom-left anchor */}
        <div className="hmob-prev" onClick={prev} title="Previous">
          <img src={prevItem?.image} alt={prevItem?.title||''}
            onError={e=>{ e.target.style.display='none'; }}/>
        </div>

        {/* Center: title + year/genre + play */}
        <div className="hmob-info">
          <div className="hmob-title">{a.title}</div>
          <div className="hmob-row">
            {(a.year||a.seasonYear) && <span className="hmob-year">{a.year||a.seasonYear}</span>}
            {a.genres[0] && <><span className="hmob-dot-sep"/><span className="hmob-genre">{a.genres[0]}</span></>}
          </div>
        </div>
        <button className="hmob-play" onClick={()=>onPlay(a,'watch')}>
          <HeroPlayTri s={10}/> Play
        </button>

        {/* Next slide preview card — bottom-right, acts as next button */}
        <div className="hmob-next" onClick={next}>
          <img className="hmob-next-img" src={nextItem?.image} alt={nextItem?.title||''}
            onError={e=>{ e.target.style.display='none'; }}/>
          <div className="hmob-next-info">
            <div className="hmob-next-label">Next</div>
            <div className="hmob-next-title">{nextItem?.title}</div>
          </div>
          <span className="hmob-next-chevron">›</span>
        </div>
      </div>
    </div>
  );
}

function SearchBar({onSel, onSearch}) {
  const [q,setQ] = useState(''), [res,setRes] = useState([]), [open,setO] = useState(false);
  const tmr = useRef(null), ref = useRef(null);
  useEffect(() => {
    const h = e => { if (!ref.current?.contains(e.target)) setO(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const run = useCallback(async v => {
    if (!v.trim()) { setRes([]); setO(false); return; }
    const d = await gql(Qs.search, {s:v});
    setRes((d.data?.Page?.media||[]).map(mapA)); setO(true);
  }, []);
  const oc = e => { setQ(e.target.value); clearTimeout(tmr.current); tmr.current = setTimeout(()=>run(e.target.value), 360); };
  const onKey = e => {
    if (e.key==='Enter' && q.trim()) { setO(false); onSearch(q.trim(), res); }
  };
  return (
    <div className="nav-search" ref={ref}>
      <svg className="nav-ico" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input className="nav-inp" value={q} onChange={oc} onKeyDown={onKey}
        placeholder="Search anime… (Enter for full results)"
        onFocus={()=>res.length&&setO(true)}/>
      {open && res.length > 0 && (
        <div className="search-drop">
          {res.map(a=>(
            <div key={a.id} className="s-row" onClick={()=>{onSel(a);setO(false);setQ('');}}>
              <img src={a.image} alt={a.title} onError={e=>e.target.style.display='none'}/>
              <div style={{minWidth:0}}>
                <div className="s-title">{a.title}</div>
                <div className="s-meta">{a.season||a.year}{a.airedEps?` · ${a.airedEps} eps`:''} · {a.format}</div>
              </div>
            </div>
          ))}
          <div className="s-row" style={{justifyContent:'center',color:'var(--txt3)',fontSize:11,fontFamily:'var(--mono)'}}
            onClick={()=>{setO(false); onSearch(q.trim(), res);}}>
            Press Enter or tap here to see all results →
          </div>
        </div>
      )}
    </div>
  );
}

function WatchPage({anime, startTab, onBack}) {
  const toast = useToast();
  const totalEps = anime.airedEps || anime.eps || 12;
  const [tab,    setTab]    = useState(startTab||'watch');
  const [curEp,  setCurEp]  = useState(1);
  const [lang,   setLang]   = useState('sub');
  const [srvs,   setSrvs]   = useState([]);
  const [si,     setSi]     = useState(0);
  const [key,    setKey]    = useState(0);
  const [spin,   setSpin]   = useState(true);
  const [fil,    setFil]    = useState('');
  const [shareOpen, setShareOpen] = useState(false);
  const [jikanEps,  setJikanEps]  = useState({});
  const [jikanDone, setJikanDone] = useState(false);
  const [jikanDesc, setJikanDesc] = useState('');

  useEffect(() => {
    if (!anime.descIsStub || !anime.malId) return;
    (async () => {
      try {
        const r = await fetch(`https://api.jikan.moe/v4/anime/${anime.malId}`);
        const d = await r.json();
        if (d.data?.synopsis) setJikanDesc(d.data.synopsis);
      } catch(e) {}
    })();
  }, [anime.malId, anime.descIsStub]);

  useEffect(() => {
    if (!anime.malId || jikanDone) return;
    (async () => {
      const map = {};
      const maxPages = Math.ceil(Math.min(totalEps, 500) / 100);
      for (let p = 1; p <= maxPages; p++) {
        try {
          const r = await fetch(`https://api.jikan.moe/v4/anime/${anime.malId}/episodes?page=${p}`);
          const d = await r.json();
          const items = d.data || [];
          items.forEach(ep => {
            if (ep.mal_id) map[ep.mal_id] = { title: ep.title || null };
          });
          setJikanEps(prev => ({...prev, ...map}));
          if (items.length < 100) break;
          await new Promise(res => setTimeout(res, 420));
        } catch(e) { break; }
      }
      setJikanDone(true);
    })();
  }, [anime.malId, totalEps]);

  const loadEp = useCallback((ep, lng) => {
    const L = lng || lang;
    setSrvs(buildServers(anime.id, ep, L, anime.malId));
    setSi(0); setKey(k=>k+1); setSpin(true); setCurEp(ep);
  }, [anime.id, anime.malId, lang]);

  useEffect(() => { loadEp(1, 'sub'); }, []);

  // Record to Continue Watching whenever episode changes
  useEffect(() => { recordCW(anime, curEp); }, [curEp]);

  // Keyboard shortcuts
  useEffect(() => {
    const onKey = e => {
      if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
      if (e.key==='ArrowRight'&&curEp<totalEps) { loadEp(curEp+1,lang); toast('▶ Next episode'); }
      if (e.key==='ArrowLeft'&&curEp>1)         { loadEp(curEp-1,lang); toast('◀ Previous episode'); }
      if (e.key==='f'||e.key==='F') {
        const iframe = document.querySelector('.player-iframe');

function readHash() {
  try {
    // Check for ?a=ANIME_ID query param (used by share links for OG crawlers)
    const qp = new URLSearchParams(window.location.search);
    const animeId = qp.get('a');
    if (animeId) return {view:'watch', animeId, wTab:'watch', fromShare:true};

    const raw = (window.location.hash||'').slice(1);
    const [sec,b,c] = raw.split('/');
    if (sec==='watch'&&b) return {view:'watch',animeId:b,wTab:c||'watch'};
    if (sec==='home')     return {view:'home',tab:b||'trending',page:Math.max(1,parseInt(c)||1)};
  } catch(e) {}
  return {view:'home',tab:'trending',page:1};
}
function writeHash(view, extra={}) {
  if (view==='watch') window.location.hash=`#watch/${extra.id||''}/${extra.wTab||'watch'}`;
  else                window.location.hash=`#home/${extra.tab||'trending'}/${extra.page||1}`;
}

// ── SCHEDULE PAGE ─────────────────────────────────────────────────────────────
const WEEK_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function SchedulePage({onPlay}) {
  const todayIdx = new Date().getDay();
  const [day, setDay] = useState(todayIdx);
  const [schedCache, setSchedCache] = useState({});
  const [loading, setLoading] = useState(false);

  useEffect(function() {
    if (schedCache[day] !== undefined) return;
    setLoading(true);
    var now = new Date();
    var start = new Date(now);
    start.setDate(now.getDate() + (day - todayIdx));
    start.setHours(0,0,0,0);
    var end = new Date(start);
    end.setHours(23,59,59,999);
    var from = Math.floor(start.getTime()/1000);
    var to   = Math.floor(end.getTime()/1000);

    gql(Qs.schedule, {from: from, to: to}).then(function(d) {
      var entries = (d.data && d.data.Page && d.data.Page.airingSchedules || []).map(function(e) {
        var a = mapA(e.media);
        a.airingAt = e.airingAt;
        a.airingEp = e.episode;
        return a;
      });
      setSchedCache(function(prev) {
        var next = Object.assign({}, prev);
        next[day] = entries;
        return next;
      });
      setLoading(false);
    }).catch(function() { setLoading(false); });
  }, [day]);

  var entries = schedCache[day] || [];
  var nowTs = Math.floor(Date.now()/1000);

  function fmtTime(ts) {
    var d = new Date(ts * 1000);
    var h = d.getHours().toString().padStart(2,'0');
    var m = d.getMinutes().toString().padStart(2,'0');
    return h + ':' + m;
  }

  return (
    <div className="sched-wrap">
      <div style={{padding:'0 clamp(.75rem,3.5vw,2.5rem) .6rem'}}>
        <div className="sec-hdr" style={{marginBottom:'10px'}}>
          <div className="sec-bar"/>
          <h2 className="sec-title">📅 Airing Schedule</h2>
        </div>
      </div>
      <div className="sched-days">
        {WEEK_DAYS.map(function(name, i) {
          return (
            <button key={i} className={'sched-day-btn' + (day===i?' on':'')} onClick={function(){setDay(i);}}>
              {name}
              {i===todayIdx && <span className="sched-today">TODAY</span>}
            </button>
          );
        })}
      </div>
      <div className="sched-list">
        {loading && Array(5).fill(0).map(function(_,i){ return <div key={i} className="sched-sk"/>; })}
        {!loading && entries.length===0 && (
          <div className="sched-empty">
            <div style={{fontSize:'2.2rem',opacity:.25}}>📭</div>
            <div>No anime scheduled for {WEEK_DAYS[day]}</div>
          </div>
        )}
        {!loading && entries.map(function(a, i) {
          var aired = a.airingAt <= nowTs;
          return (
            <div key={i} className="sched-item" onClick={function(){onPlay(a,'watch');}}>
              <img className="sched-item-img" src={a.image} alt={a.title}
                onError={function(e){e.target.style.opacity='0';}}/>
              <div className="sched-item-info">
                <div className="sched-item-title">{a.title}</div>
                <div className="sched-item-meta">
                  <span>EP {a.airingEp}</span>
                  {a.genres[0] && <span>· {a.genres[0]}</span>}
                  {a.format && <span>· {a.format}</span>}
                </div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div className="sched-time">{fmtTime(a.airingAt)}</div>
                <div className={'sched-badge ' + (aired?'aired':'airing')}>
                  {aired ? 'AIRED' : 'TODAY'}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const ToastCtx = React.createContext(null);
function ToastProvider({children}) {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, duration=2800) => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, {id, msg, out:false}]);
    setTimeout(() => setToasts(t => t.map(x => x.id===id ? {...x,out:true} : x)), duration);
    setTimeout(() => setToasts(t => t.filter(x => x.id!==id)), duration+350);
  }, []);
  return (
    <ToastCtx.Provider value={show}>
      {children}
      <div className="toast-wrap">
        {toasts.map(t => <div key={t.id} className={'toast'+(t.out?' out':'')}>{t.msg}</div>)}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => React.useContext(ToastCtx);

// ── CONTINUE WATCHING ─────────────────────────────────────────────────────────
const CW_KEY = 'jsa_continue_watching';
function loadCW() {
  try { return JSON.parse(localStorage.getItem(CW_KEY)||'[]'); } catch { return []; }
}
function saveCW(list) {
  try { localStorage.setItem(CW_KEY, JSON.stringify(list.slice(0,12))); } catch {}
}
function recordCW(anime, ep) {
  const list = loadCW().filter(x => x.id !== anime.id);
  list.unshift({ id:anime.id, title:anime.title, image:anime.image,
    ep, totalEps: anime.airedEps||anime.eps||12, ts: Date.now() });
  saveCW(list);
}
function removeCW(id) {
  saveCW(loadCW().filter(x => x.id !== id));
}

function ShareModal({url, hashUrl, title, image, desc, onClose, toast}) {
  // url      = clean ?a=ID URL — crawlers (WhatsApp/Twitter) can read this
  // hashUrl  = full hash URL — for copy link (direct navigation)
  const shareUrl  = url  || hashUrl || window.location.href;
  const copyUrl   = hashUrl || url  || window.location.href;
  const shareText = `${title} — Watch on JustStreamAnime`;

  const onOverlay = e => { if (e.target===e.currentTarget) onClose(); };
  const apps = [
    { label:'WhatsApp', Icon:ShareIcons.WhatsApp,
      // WhatsApp shows image from OG tags — use clean URL so crawler can find them
      href:`https://wa.me/?text=${encodeURIComponent(shareText + '\n' + shareUrl)}` },
    { label:'Telegram', Icon:ShareIcons.Telegram,
      href:`https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}` },
    { label:'Twitter', Icon:ShareIcons.Twitter,
      // Twitter: text only (no url= param since hash URLs get stripped)
      // Twitter auto-appends the URL from og:url meta tag
      href:`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText + ' ' + shareUrl)}` },
    { label:'Facebook', Icon:ShareIcons.Facebook,
      href:`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}` },
    { label:'Reddit', Icon:ShareIcons.Reddit,
      href:`https://www.reddit.com/submit?url=${encodeURIComponent(shareUrl)}&title=${encodeURIComponent(title)}` },
    { label:'Email', Icon:ShareIcons.Email,
      href:`mailto:?subject=${encodeURIComponent(title)}&body=${encodeURIComponent('Watch ' + title + ' on JustStreamAnime:\n' + shareUrl)}` },
    { label:'Discord', Icon:ShareIcons.Discord,
      // Discord renders OG previews — paste the clean URL for best preview
      action:()=>{ navigator.clipboard?.writeText(shareUrl).then(()=>toast('📋 Discord link copied — paste it in your server!')); onClose(); } },
    { label:'Copy Link', Icon:ShareIcons.CopyLink,
      action:()=>{ navigator.clipboard?.writeText(copyUrl).then(()=>toast('🔗 Link copied!')); onClose(); } },
  ];
  return (
    <div className="share-overlay" onClick={onOverlay}>
      <div className="share-sheet" onClick={e=>e.stopPropagation()}>
        <div className="share-sheet-hdr">
          <span className="share-sheet-title">Share this Anime</span>
          <button className="share-sheet-close" onClick={onClose}>✕</button>
        </div>
        <div className="share-apps">
          {apps.map(({label,Icon,href,action})=>(
            <button key={label} className="share-app-btn"
              onClick={()=>{ if(action) action(); else { window.open(href,'_blank','noopener'); onClose(); } }}>
              <div className="share-app-ico" style={{background:'transparent',padding:0}}>
                <Icon/>
              </div>
              <span className="share-app-lbl">{label}</span>
            </button>
          ))}
        </div>
        <div className="share-url-row">
          <span className="share-url-txt">{copyUrl}</span>
          <button className="share-copy-btn"
            onClick={()=>navigator.clipboard?.writeText(copyUrl).then(()=>{ toast('🔗 Copied!'); onClose(); })}>
            Copy
          </button>
        </div>
      </div>
    </div>
  );
}


// ── Dynamic OG meta tag updater ───────────────────────────────────────────────
// Updates meta tags so sharing an anime episode shows its cover image.
// Works immediately in Telegram previews. WhatsApp/Facebook require server-side
// rendering — for those, the anime title still appears in the share text.
function updateOGTags({title, image, desc, url}) {
  const set = (id, attr, val) => {
    const el = document.getElementById(id);
    if (el && val) el.setAttribute(attr, val);
  };
  const siteTitle = title ? `${title} – JustStreamAnime` : 'JustStreamAnime – Watch Anime Free Online';
  const siteDesc  = desc  ? desc.slice(0, 200) : 'Stream anime free online. Watch trending, popular and top-rated anime with subtitles or dub.';
  const imgUrl    = image || 'https://jsanime.site/og-image.jpg';
  const pageUrl   = url   || 'https://jsanime.site/';

  set('og-title',   'content', siteTitle);
  set('og-desc',    'content', siteDesc);
  set('og-image',   'content', imgUrl);
  set('og-image-w', 'content', '460');
  set('og-image-h', 'content', '650');
  set('og-url',     'content', pageUrl);
  set('tw-title',   'content', siteTitle);
  set('tw-image',   'content', imgUrl);
  // Also update document title
  document.title = siteTitle;
}

function resetOGTags() {
  updateOGTags({});
  document.title = 'JustStreamAnime – Watch Anime Free Online';
}

        <HistoryIco/><span>History</span>
      </button>
    </div>
  );
}

// ── WATCH HISTORY PAGE ────────────────────────────────────────────────────────
) {
  const clearAll = () => {
    localStorage.removeItem('jsa_continue_watching');
    setCwList([]);
  };
  const removeOne = (id) => { removeCW(id); setCwList(loadCW()); };

  return (
    <div className="hist-wrap">
      <div className="hist-hdr">
        <div className="hist-title">
          <HistoryIco/>
          Watch History
          {cwList.length > 0 && <span className="hist-count">{cwList.length} items</span>}
        </div>
        {cwList.length > 0 && (
          <button className="hist-clear" onClick={clearAll}>
            <svg viewBox="0 0 20 20" fill="currentColor" style={{width:12,height:12}}>
              <path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd"/>
            </svg>
            Clear History
          </button>
        )}
      </div>

      {cwList.length === 0 ? (
        <div className="hist-empty">
          <div className="hist-empty-ico">📺</div>
          <div className="hist-empty-txt">No watch history yet</div>
          <div className="hist-empty-sub">Anime you watch will appear here</div>
        </div>
      ) : (
        <div className="hist-grid">
          {cwList.map(item => {
            const prog = Math.min(100, Math.round((item.ep / item.totalEps) * 100));
            return (
              <div key={item.id} className="hist-card" onClick={()=>onPlay(item)}>
                <div className="hist-card-top">
                  <img className="hist-card-img" src={item.image} alt={item.title}
                    onError={e=>e.target.style.display='none'}/>
                  <div className="hist-card-grad"/>
                  <div className="hist-card-play">
                    <div className="hist-play-circle"><PIco s={14}/></div>
                  </div>
                  <div className="hist-ep">EP {item.ep}</div>
                  <div className="hist-prog-wrap">
                    <div className="hist-prog" style={{width:prog+'%'}}/>
                  </div>
                  <button className="hist-remove"
                    onPointerDown={e=>{e.stopPropagation();e.preventDefault();removeOne(item.id);}}
                    aria-label="Remove">✕</button>
                </div>
                <div className="hist-card-body">
                  <div className="hist-card-title">{item.title}</div>
                  <div className="hist-card-ep">Episode {item.ep} · {prog}% watched</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


// ── RECENTLY AIRED ROW ────────────────────────────────────────────────────────
function RecentlyAired({onPlay}) {
  const [items, setItems] = useState([]);
  useEffect(() => {
    const now   = Math.floor(Date.now()/1000);
    const from  = now - (60 * 60 * 40); // last 40 hours
    gql(Qs.schedule, {from, to: now}).then(d => {
      const raw = d.data?.Page?.airingSchedules || [];
      const list = [...raw]
        .sort((a, b) => b.airingAt - a.airingAt)
        .slice(0, 16)
        .map(e => ({ ...mapA(e.media), airingEp: e.episode }))
        .filter(a => a.image);
      setItems(list);
    }).catch(() => {});
  }, []);

  if (!items.length) return null;

  return (
    <div className="ra-section">
      <div className="sec-hdr" style={{marginBottom:'10px'}}>
        <div className="sec-bar"/>
        <h2 className="sec-title">🕐 Recently Aired</h2>
      </div>
      <div className="ra-scroll">
        {items.map((a, i) => (
          <div key={i} className="ra-card" onClick={() => onPlay(a, 'watch')}>
            <img className="ra-thumb" src={a.image} alt={a.title}
              onError={e => e.target.style.opacity = '0'}/>
            <div className="ra-info">
              <div className="ra-title">{a.title}</div>
              <span className="ra-ep">EP {a.airingEp}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── EXPLORE PAGE ──────────────────────────────────────────────────────────────
const EXPLORE_YEARS = [];
{ const _sy = new Date().getFullYear()+1; for (let _y=_sy; _y>=1960; _y--) EXPLORE_YEARS.push(_y); }

const BROWSE_Q = 'query($p:Int,$genre:String,$format:MediaFormat,$status:MediaStatus,$year:Int){Page(page:$p,perPage:30){pageInfo{lastPage}media(type:ANIME,isAdult:false,genre:$genre,format:$format,status:$status,seasonYear:$year,sort:POPULARITY_DESC){' + FL + '}}}';

function ExplorePage({onPlay}) {
  const [fmt,    setFmt]    = useState('');
  const [genre,  setGenre]  = useState('');
  const [status, setStatus] = useState('');
  const [year,   setYear]   = useState('');
  const [items,  setItems]  = useState([]);
  const [loading,setLoad]   = useState(false);
  const [pg,     setPg]     = useState(1);
  const [totalPg,setTPg]    = useState(1);

  const hasFilter = fmt || genre || status || year;

  const runQuery = useCallback(async (f, g, s, y, p) => {
    setLoad(true);
    const vars = {p};
    if (f) vars.format = f;
    if (g) vars.genre  = g;
    if (s) vars.status = s;
    if (y) vars.year   = parseInt(y);
    try {
      const d = await gql(BROWSE_Q, vars);
      setItems((d.data?.Page?.media||[]).map(mapA));
      setTPg(d.data?.Page?.pageInfo?.lastPage||1);
    } catch(e) {}
    setLoad(false);
  }, []);

  useEffect(() => { runQuery(fmt, genre, status, year, pg); }, [fmt, genre, status, year, pg]);

  const change = (setter) => (e) => { setPg(1); setter(e.target.value); };
  const reset  = () => { setPg(1); setFmt(''); setGenre(''); setStatus(''); setYear(''); };

  const ps = [], s2 = Math.max(1,pg-2), e2 = Math.min(totalPg,s2+4);
  for (let i=s2; i<=e2; i++) ps.push(i);

  return (
    <div className="exp-wrap">
      <div style={{padding:'0 clamp(.75rem,3.5vw,2.5rem) .6rem'}}>
        <div className="sec-hdr" style={{marginBottom:'12px'}}>
          <div className="sec-bar"/>
          <h2 className="sec-title">🔍 Explore Anime</h2>
        </div>
      </div>

      <div className="exp-filters">
        {/* Format */}
        <select className={'exp-select'+(fmt?' active':'')} value={fmt} onChange={change(setFmt)}>
          <option value="">All Format</option>
          <option value="TV">TV</option>
          <option value="MOVIE">Movie</option>
          <option value="OVA">OVA</option>
          <option value="ONA">ONA</option>
          <option value="SPECIAL">Special</option>
        </select>

        {/* Genre */}
        <select className={'exp-select'+(genre?' active':'')} value={genre} onChange={change(setGenre)}>
          <option value="">All Genres</option>
          {['Action','Adventure','Comedy','Drama','Fantasy','Horror','Mecha',
            'Mystery','Romance','Sci-Fi','Slice of Life','Sports','Supernatural','Thriller'
          ].map(g => <option key={g} value={g}>{g}</option>)}
        </select>

        {/* Status */}
        <select className={'exp-select'+(status?' active':'')} value={status} onChange={change(setStatus)}>
          <option value="">All Status</option>
          <option value="RELEASING">Releasing</option>
          <option value="FINISHED">Finished</option>
          <option value="NOT_YET_RELEASED">Upcoming</option>
        </select>

        {/* Year */}
        <select className={'exp-select'+(year?' active':'')} value={year} onChange={change(setYear)}>
          <option value="">All Years</option>
          {EXPLORE_YEARS.map(y => <option key={y} value={y}>{y}</option>)}
        </select>

        {hasFilter && (
          <button className="exp-reset" onClick={reset}>
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8"
              strokeLinecap="round" style={{width:10,height:10}}>
              <path d="M2 2l12 12M14 2L2 14"/>
            </svg>
            Reset Filters
          </button>
        )}
      </div>

      <div className="section" style={{paddingTop:'0'}}>
        {loading
          ? <div className="agrid">{Array(12).fill(0).map((_,i)=><div key={i} className="sk"/>)}</div>
          : items.length
            ? <div className="agrid">{items.map(a=><AnimeCard key={a.id} a={a} onPlay={onPlay}/>)}</div>
            : <div className="empty">
                <div className="empty-ico">🔍</div>
                <div className="empty-title">No results found</div>
                <div className="empty-sub">Try different filters</div>
              </div>
        }
      </div>

      {!loading && items.length > 0 && totalPg > 1 && (
        <div className="pag">
          <button className="pgb" disabled={pg===1} onClick={()=>setPg(p=>p-1)}>‹</button>
          {ps.map(p=><button key={p} className={'pgb'+(p===pg?' on':'')} onClick={()=>setPg(p)}>{p}</button>)}
          <button className="pgb" disabled={pg===totalPg} onClick={()=>setPg(p=>p+1)}>›</button>
        </div>
      )}
    </div>
  );
}

function App() {
  const init = readHash();
  const [view,    setView]  = useState(init.view);
  const [watching,setWatch] = useState(null);
  const [wTab,    setWTab]  = useState(init.wTab||'watch');
  const [tab,     setTab]   = useState(init.tab||'trending');
  const [page,    setPage]  = useState(init.page||1);
  const [totalPg, setTPg]   = useState(1);
  const [items,   setItems] = useState([]);
  const [hero,    setHero]  = useState([]);
  const [loading, setLoad]  = useState(true);
  const [genre,   setGenre] = useState('All');
  const [cwList,  setCwList] = useState(() => loadCW());
  const [srView,  setSrView] = useState(null); // {query, results}
  const [navPage, setNavPage] = useState('home'); // home|explore|schedule|history
  const cache = useRef({});

  const heroLoaded = useRef(false);
  const load = useCallback(async (t, p) => {
    setLoad(true);
    // Always fetch trending for hero if not yet loaded (runs in parallel)
    if (!heroLoaded.current) {
      heroLoaded.current = true;
      gql(Qs.trending, {p:1}).then(d => {
        const list = (d.data?.Page?.media||[]).map(mapA);
        list.forEach(a => { cache.current[String(a.id)] = a; });
        setHero(list);
      }).catch(()=>{});
    }
    const d = await gql(Qs[t], {p});
    const list = (d.data?.Page?.media||[]).map(mapA);
    list.forEach(a => { cache.current[String(a.id)] = a; });
    setItems(list); setTPg(d.data?.Page?.pageInfo?.lastPage||1);
    setLoad(false);
  }, []);

  const booted = useRef(false);
  useEffect(() => {
    if (booted.current) return; booted.current = true;
    if (init.view === 'watch') {
      (async () => {
        setLoad(true);
        const d = await gql(Qs.trending, {p:1});
        const list = (d.data?.Page?.media||[]).map(mapA);
        list.forEach(a => { cache.current[String(a.id)] = a; });
        setHero(list); setItems(list); setTPg(d.data?.Page?.pageInfo?.lastPage||1); setLoad(false);
        const cached = cache.current[String(init.animeId)];
        if (cached) {
          updateOGTags({
            title: cached.title,
            image: cached.banner || cached.image,
            desc:  cached.desc,
            url:   `https://jsanime.site/share?a=${cached.id}`,
          });
          setWatch(cached); setWTab(init.wTab||'watch'); setView('watch');
        } else {
          // Not in cache — fetch from AniList directly (e.g. opened from share link)
          gql(Qs.detail, {id: parseInt(init.animeId)}).then(d => {
            const a = d.data?.Media;
            if (a) {
              const anime = mapA(a);
              cache.current[String(anime.id)] = anime;
              updateOGTags({title:anime.title, image:anime.banner||anime.image, desc:anime.desc, url:`https://jsanime.site/share?a=${anime.id}`});
              setWatch(anime); setWTab(init.wTab||'watch'); setView('watch');
            } else { setView('home'); writeHash('home',{tab:'trending',page:1}); }
          }).catch(()=>{ setView('home'); writeHash('home',{tab:'trending',page:1}); });
        }
      })();
    } else {
      // Always prime the hero with trending, then load the requested tab
      if ((init.tab||'trending') !== 'trending') {
        gql(Qs.trending, {p:1}).then(d => {
          const list = (d.data?.Page?.media||[]).map(mapA);
          list.forEach(a => { cache.current[String(a.id)] = a; });
          setHero(list);
          heroLoaded.current = true;
        }).catch(()=>{});
      }
      load(init.tab||'trending', init.page||1);
    }
  }, []);

  const prevTab = useRef(init.tab);
  useEffect(() => {
    if (prevTab.current===tab) return;
    prevTab.current = tab; setPage(1); setGenre('All'); load(tab,1); writeHash('home',{tab,page:1});
  }, [tab]);
  useEffect(() => { if (page>1) load(tab,page); }, [page]);

  const openWatch = (a, t='watch') => {
    // ContinueWatching items have partial data — merge with cache if available
    const full = cache.current[String(a.id)] || a;
    // Update OG meta tags so sharing this page shows the anime's cover image
    updateOGTags({
      title: full.title,
      image: full.banner || full.image,
      desc:  full.desc,
      url:   `https://jsanime.site/#watch/${full.id}/watch`,
    });
    setWatch(full); setWTab(t); setView('watch'); setSrView(null);
    writeHash('watch',{id:full.id,wTab:t}); window.scrollTo({top:0});
  };
  const goHome = () => {
    setView('home'); setWatch(null); setSrView(null);
    setCwList(loadCW()); resetOGTags(); setNavPage('home');
    writeHash('home',{tab,page}); window.scrollTo({top:0});
  };
  const chPg   = p  => { setPage(p); writeHash('home',{tab,page:p}); window.scrollTo({top:0,behavior:'smooth'}); };

  useEffect(() => {
    const onPop = () => {
      const h = readHash();
      if (h.view==='watch') {
        const c = cache.current[String(h.animeId)];
        if (c) { setWatch(c); setWTab(h.wTab); setView('watch'); } else setView('home');
      } else { setView('home'); setWatch(null); setTab(h.tab); setPage(h.page); }
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  const ps=[], s=Math.max(1,page-2), e2=Math.min(totalPg,s+4);
  for (let i=s; i<=e2; i++) ps.push(i);
  const filteredItems = genre==='All' ? items : items.filter(a=>a.genres.includes(genre));

  if (view==='watch'&&watching) return (
    <ToastProvider>
      <WatchPage anime={watching} startTab={wTab} onBack={goHome}/>
      <BackToTop/>
    </ToastProvider>
  );
  if (view==='dmca')    return <PolicyPage type="dmca"    onBack={()=>{setView('home');writeHash('home',{tab,page});}}/>;
  if (view==='privacy') return <PolicyPage type="privacy" onBack={()=>{setView('home');writeHash('home',{tab,page});}}/>;

  const handleSearch = (q, preloaded) => { setSrView({query:q, results:preloaded||[]}); setNavPage('explore'); };

  const gotoNav = (p) => {
    setNavPage(p);
    if (p === 'schedule') setTab('schedule');
    else if (p === 'home') setTab('trending');
    setSrView(null);
    window.scrollTo({top:0});
  };


  return (
    <ToastProvider>
      {/* ── Sidebar (desktop) + Mobile bottom nav ── */}
      <Sidebar page={navPage} setPage={gotoNav} goHome={goHome}/>
      <MobileNav page={navPage} setPage={gotoNav}/>

      <nav className="nav">
        <div className="logo" onClick={goHome}>
          <div className="logo-mark"><PIco s={13}/></div>
          <div className="logo-name">just<em>stream</em>anime</div>
        </div>
        <SearchBar onSel={a=>openWatch(a,'watch')} onSearch={handleSearch}/>
      </nav>

      {/* ── History Page ── */}
      {navPage==='history' && (
        <HistoryPage cwList={cwList} setCwList={setCwList} onPlay={openWatch}/>
      )}
      {navPage==='history' && <BackToTop/>}

      {/* ── Main content (hidden on history page) ── */}
      {navPage!=='history' && (
      <>{/* ── Search results overlay ── */}
      {srView ? (
        <SearchResultsPage query={srView.query} results={srView.results}
          loading={false} onPlay={openWatch} onBack={()=>setSrView(null)}/>

      ) : navPage==='explore' ? (
        <ExplorePage onPlay={openWatch}/>

      ) : tab==='schedule' ? (
        <>
          <div style={{paddingTop:'calc(var(--nav) + .5rem)'}}>
            <div className="tabs-bar">
              {TABS.map(t=>(
                <button key={t.id} className={'tbtn '+(tab===t.id?'on':'off')} onClick={()=>setTab(t.id)}>{t.label}</button>
              ))}
            </div>
          </div>
          <SchedulePage onPlay={openWatch}/>
        </>

      ) : (
        <>
          {page===1&&<Hero items={hero} onPlay={openWatch}/>}

          {/* Continue Watching row */}
          {page===1&&cwList.length>0&&(
            <div style={{paddingTop:'clamp(.6rem,2vw,1rem)'}}>
              <ContinueWatching onPlay={openWatch} cwList={cwList} setCwList={setCwList}/>
            </div>
          )}

          {/* Recently Aired — always shown on page 1 */}
          {page===1&&<RecentlyAired onPlay={openWatch}/>}

          <div style={{paddingTop:page===1?'0':'calc(var(--nav) + 0.5rem)'}}>
            <div className="tabs-bar">
              {TABS.map(t=>(
                <button key={t.id} className={'tbtn '+(tab===t.id?'on':'off')} onClick={()=>setTab(t.id)}>{t.label}</button>
              ))}
            </div>
          </div>

          {/* Genre filter — collapsible premium pills */}
          <GenreBar genre={genre} setGenre={setGenre}/>

          <div className="section">
            <div className="sec-hdr">
              <div className="sec-bar"/>
              <h2 className="sec-title">
                {TABS.find(t=>t.id===tab)?.label}
                {genre!=='All'&&<span style={{color:'var(--red)',marginLeft:6}}>· {genre}</span>}
                {page>1&&` — Page ${page}`}
              </h2>
            </div>
            {loading
              ? <div className="agrid">{Array(12).fill(0).map((_,i)=><div key={i} className="sk"/>)}</div>
              : filteredItems.length
                ? <div className="agrid">{filteredItems.map(a=><AnimeCard key={a.id} a={a} onPlay={openWatch}/>)}</div>
                : <EmptyState query={genre!=='All'?genre:null} onClear={()=>setGenre('All')}/>
            }
          </div>
          {filteredItems.length>0&&(
            <div className="pag">
              <button className="pgb" disabled={page===1} onClick={()=>chPg(page-1)}>‹</button>
              {ps.map(p=><button key={p} className={'pgb'+(p===page?' on':'')} onClick={()=>chPg(p)}>{p}</button>)}
              <button className="pgb" disabled={page===totalPg} onClick={()=>chPg(page+1)}>›</button>
            </div>
          )}
        </>
      )}

      </> )}{/* end main content */}

      <footer>
        <div className="ft-logo">just<em>stream</em>anime</div>
        <div className="ft-socials">
          <a href="https://t.me/juststreamanime" target="_blank" rel="noopener noreferrer"
            className="ft-social tg" title="Telegram" aria-label="Telegram">
            <TelegramIcon/>
          </a>
          <a href="https://x.com/juststreamanime" target="_blank" rel="noopener noreferrer"
            className="ft-social tw" title="Twitter / X" aria-label="Twitter">
            <TwitterXIcon/>
          </a>
          <a href="https://discord.gg/Upyq7cYcPa" target="_blank" rel="noopener noreferrer"
            className="ft-social dc" title="Discord Server" aria-label="Discord">
            <DiscordIcon/>
          </a>
        </div>
        <div className="ft-links">
          <button className="ft-link" onClick={()=>setView('dmca')}>Copyright Policy</button>
          <span className="ft-sep">·</span>
          <button className="ft-link" onClick={()=>setView('privacy')}>Privacy</button>
        </div>
      </footer>
      <BackToTop/>
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
