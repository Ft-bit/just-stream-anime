<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>just stream anime</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,700;0,9..40,900;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #070710;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #070710; }
    ::-webkit-scrollbar-thumb { background: #e11d4866; border-radius: 3px; }

    .mono { font-family: 'Space Mono', monospace; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 60px;
      background: rgba(7,7,16,0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg,#e11d48,#9f1239);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-size: 1.1rem; font-weight: 900; color: #fff; letter-spacing: -0.02em; }
    .logo-text span { color: #e11d48; }

    /* SEARCH */
    .search-wrap { position: relative; }
    .search-input {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 8px 12px 8px 36px;
      border-radius: 10px;
      width: 240px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-input:focus {
      border-color: rgba(225,29,72,0.5);
      background: rgba(255,255,255,0.09);
    }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: #6b7280; pointer-events: none;
    }
    .search-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      width: 320px; background: #0f0f1a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      z-index: 200;
    }
    .search-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: rgba(255,255,255,0.05); }
    .search-item img {
      width: 40px; height: 56px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
      image-rendering: auto;
    }
    .search-item-title { font-weight: 700; font-size: 13px; color: #fff; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .search-item-meta { font-family: 'Space Mono',monospace; font-size: 10px; color: #6b7280; }

    /* HERO */
    .hero {
      position: relative; height: 75vh; overflow: hidden;
      background: #070710;
    }
    .hero-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      image-rendering: auto;
      filter: brightness(0.52);
      transition: opacity 0.7s ease;
    }
    .hero-fade-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; height: 70%;
      background: linear-gradient(to top, #070710 5%, rgba(7,7,16,0.7) 50%, transparent 100%);
      pointer-events: none;
    }
    .hero-fade-top {
      position: absolute; top: 0; left: 0; right: 0; height: 120px;
      background: linear-gradient(to bottom, rgba(7,7,16,0.7), transparent);
      pointer-events: none;
    }
    .hero-content {
      position: absolute; bottom: 0; left: 0;
      padding: 3rem 3.5rem;
      max-width: 700px;
    }
    .hero-genres { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .genre-tag {
      font-family: 'Space Mono',monospace;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      padding: 3px 8px;
      border: 1px solid rgba(225,29,72,0.4);
      color: #fb7185;
      background: rgba(225,29,72,0.1);
      border-radius: 4px;
    }
    .hero-title {
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 900; line-height: 1.05;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 12px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    .hero-meta {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Space Mono',monospace; font-size: 12px; color: #9ca3af;
      margin-bottom: 14px;
    }
    .hero-dot { color: #374151; }
    .hero-desc {
      font-size: 14px; line-height: 1.7; color: #d1d5db;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 24px;
      max-width: 560px;
    }
    .hero-btns { display: flex; gap: 12px; }
    .btn-watch {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; border-radius: 12px;
      font-family: 'Space Mono',monospace; font-size: 12px; font-weight: 700;
      color: #fff; text-decoration: none;
      background: linear-gradient(135deg,#e11d48,#be123c);
      box-shadow: 0 4px 24px rgba(225,29,72,0.45);
      border: none; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-watch:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(225,29,72,0.55); }
    .btn-info {
      padding: 12px 24px; border-radius: 12px;
      font-family: 'Space Mono',monospace; font-size: 12px; font-weight: 700;
      color: #fff; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-info:hover { background: rgba(255,255,255,0.14); }

    /* HERO NAV ARROWS */
    .hero-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10;
      transition: background 0.2s, transform 0.15s;
      user-select: none;
    }
    .hero-arrow:hover { background: rgba(225,29,72,0.5); transform: translateY(-50%) scale(1.1); }
    .hero-arrow-left { left: 20px; }
    .hero-arrow-right { right: 20px; }

    /* HERO DOTS */
    .hero-dots {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 10;
    }
    .hero-dot-btn {
      height: 5px; border-radius: 3px;
      background: rgba(255,255,255,0.3);
      border: none; cursor: pointer;
      transition: width 0.3s, background 0.3s;
    }
    .hero-dot-btn.active { background: #e11d48; }

    /* SCORE */
    .score-badge {
      font-family: 'Space Mono',monospace; font-size: 11px; font-weight: 700;
      color: #fbbf24;
    }

    /* GRID SECTION */
    .grid-section { max-width: 1400px; margin: 0 auto; padding: 3rem 2rem; }
    .section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 2rem; }
    .section-title { font-size: 1.4rem; font-weight: 900; color: #fff; letter-spacing: -0.02em; white-space: nowrap; }
    .section-line { flex: 1; height: 1px; background: linear-gradient(to right, rgba(225,29,72,0.4), transparent); }
    .section-page { font-family: 'Space Mono',monospace; font-size: 11px; color: #4b5563; white-space: nowrap; }

    /* ANIME GRID */
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 18px;
    }
    .anime-card {
      background: #0f0f1a;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(.4,0,.2,1), box-shadow 0.25s;
    }
    .anime-card:hover {
      transform: translateY(-6px) scale(1.02);
    }
    .anime-card-img-wrap {
      position: relative; overflow: hidden;
      height: 240px; background: #1a1a2e;
    }
    .anime-card-img {
      width: 100%; height: 100%; object-fit: cover;
      image-rendering: auto;
      transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    }
    .anime-card:hover .anime-card-img { transform: scale(1.06); }
    .anime-card-img-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, #0f0f1a 0%, transparent 50%);
    }
    .anime-card-score {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      padding: 3px 7px; border-radius: 6px;
      font-family: 'Space Mono',monospace; font-size: 11px; font-weight: 700;
      color: #fbbf24;
    }
    .anime-card-body { padding: 10px 12px 12px; }
    .anime-card-title {
      font-weight: 700; font-size: 13px; color: #f9fafb;
      line-height: 1.35; margin-bottom: 5px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .anime-card-meta {
      font-family: 'Space Mono',monospace; font-size: 10px; color: #6b7280;
      display: flex; gap: 6px; align-items: center;
    }
    .card-dot { color: #374151; }
    .anime-card-genres { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }

    /* SKELETON */
    .skeleton {
      background: linear-gradient(90deg, #1a1a2e 25%, #222236 50%, #1a1a2e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 14px;
      height: 300px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* PAGINATION */
    .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 3rem; }
    .page-btn {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono',monospace; font-size: 13px; font-weight: 700;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      color: #9ca3af; cursor: pointer;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }
    .page-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .page-btn.active {
      background: linear-gradient(135deg,#e11d48,#be123c);
      border-color: transparent; color: #fff;
      box-shadow: 0 0 18px rgba(225,29,72,0.45);
    }
    .page-btn:disabled { opacity: 0.3; cursor: default; }

    /* MODAL */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal-box {
      background: #0f0f1a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      max-width: 800px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      position: relative;
    }
    .modal-banner {
      position: relative; height: 220px; overflow: hidden; background: #1a1a2e;
    }
    .modal-banner img {
      width: 100%; height: 100%; object-fit: cover;
      filter: brightness(0.6);
    }
    .modal-banner-fade {
      position: absolute; inset: 0;
      background: linear-gradient(to top, #0f0f1a, transparent);
    }
    .modal-close {
      position: absolute; top: 14px; right: 14px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .modal-close:hover { background: rgba(225,29,72,0.5); }
    .modal-body {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 24px;
      padding: 20px 24px 28px;
      margin-top: -60px;
      position: relative;
    }
    .modal-cover {
      width: 160px;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.08);
      object-fit: cover;
      aspect-ratio: 2/3;
      align-self: start;
    }
    .modal-title {
      font-size: 1.6rem; font-weight: 900; color: #fff;
      letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 10px;
    }
    .modal-genres { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .modal-meta {
      font-family: 'Space Mono',monospace; font-size: 11px; color: #6b7280;
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
    }
    .modal-desc {
      font-size: 13.5px; line-height: 1.75; color: #9ca3af; margin-bottom: 20px;
      display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden;
    }

    @media (max-width: 640px) {
      .hero-content { padding: 2rem 1.5rem; }
      .hero-title { font-size: 1.8rem; }
      .hero-desc { display: none; }
      .anime-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
      .modal-body { grid-template-columns: 1fr; }
      .modal-cover { width: 120px; }
      nav { padding: 0 1rem; }
      .search-input { width: 160px; }
      .grid-section { padding: 2rem 1rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const ANILIST = 'https://graphql.anilist.co';

    async function gql(query, variables = {}) {
      const r = await fetch(ANILIST, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables })
      });
      return r.json();
    }

    const TRENDING_Q = `
      query ($page: Int, $perPage: Int) {
        Page(page: $page, perPage: $perPage) {
          pageInfo { lastPage }
          media(type: ANIME, sort: TRENDING_DESC) {
            id title { romaji english }
            coverImage { extraLarge large color }
            bannerImage description(asHtml: false)
            averageScore episodes seasonYear genres siteUrl
          }
        }
      }
    `;

    const SEARCH_Q = `
      query ($search: String) {
        Page(perPage: 10) {
          media(search: $search, type: ANIME) {
            id title { romaji english }
            coverImage { large }
            episodes seasonYear siteUrl description(asHtml: false)
            averageScore genres bannerImage coverImage { extraLarge large color }
          }
        }
      }
    `;

    function mapAnime(a) {
      return {
        id: a.id,
        title: a.title.english || a.title.romaji,
        image: a.coverImage?.extraLarge || a.coverImage?.large,
        banner: a.bannerImage,
        description: (a.description || '').replace(/<[^>]+>/g, ''),
        rating: a.averageScore,
        year: a.seasonYear,
        episodes: a.episodes,
        genres: a.genres || [],
        link: a.siteUrl,
        color: a.coverImage?.color || '#e11d48'
      };
    }

    function Stars({ score }) {
      const s = Math.round((score / 100) * 5);
      return React.createElement('span', { style: { display: 'inline-flex', gap: 2 } },
        [1,2,3,4,5].map(i =>
          React.createElement('svg', {
            key: i, viewBox: '0 0 20 20', fill: 'currentColor',
            style: { width: 13, height: 13, color: i <= s ? '#fbbf24' : '#374151' }
          },
            React.createElement('path', { d: 'M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z' })
          )
        )
      );
    }

    function GenreTag({ label }) {
      return <span className="genre-tag">{label}</span>;
    }

    function AnimeCard({ anime, onClick }) {
      return (
        <div className="anime-card" onClick={() => onClick(anime)}
          style={{ '--glow': anime.color + '44' }}>
          <div className="anime-card-img-wrap">
            <img className="anime-card-img" src={anime.image} alt={anime.title}
              onError={e => { e.target.style.display = 'none'; }}/>
            <div className="anime-card-img-overlay"/>
            {anime.rating && <div className="anime-card-score">★ {anime.rating}%</div>}
          </div>
          <div className="anime-card-body">
            <div className="anime-card-title">{anime.title}</div>
            <div className="anime-card-meta">
              <span>{anime.year || '—'}</span>
              {anime.episodes && <><span className="card-dot">·</span><span>{anime.episodes} eps</span></>}
            </div>
            {anime.genres.length > 0 && (
              <div className="anime-card-genres">
                {anime.genres.slice(0,2).map(g => <GenreTag key={g} label={g}/>)}
              </div>
            )}
          </div>
        </div>
      );
    }

    function Hero({ anime, onInfo, onPrev, onNext, heroIdx, total }) {
      const [loaded, setLoaded] = useState(false);
      const [prevId, setPrevId] = useState(null);
      const src = anime?.banner || anime?.image;

      useEffect(() => {
        if (anime?.id !== prevId) { setLoaded(false); setPrevId(anime?.id); }
      }, [anime?.id]);

      if (!anime) return <div style={{ height: '75vh', background: '#070710' }}/>;

      return (
        <div className="hero">
          <img className="hero-img" key={anime.id} src={src} alt=""
            style={{ opacity: loaded ? 1 : 0 }}
            onLoad={() => setLoaded(true)}
            onError={() => setLoaded(true)}
          />
          {/* colour accent */}
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0, height: '180px', pointerEvents: 'none',
            background: `linear-gradient(to top, ${anime.color}44, transparent)`
          }}/>
          <div className="hero-fade-bottom"/>
          <div className="hero-fade-top"/>

          <div className="hero-content">
            <div className="hero-genres">
              {anime.genres.slice(0,4).map(g => <GenreTag key={g} label={g}/>)}
            </div>
            <h1 className="hero-title">{anime.title}</h1>
            <div className="hero-meta">
              <Stars score={anime.rating}/>&nbsp;
              <span className="score-badge">{anime.rating}%</span>
              <span className="hero-dot">·</span>
              <span>{anime.year}</span>
              {anime.episodes && <><span className="hero-dot">·</span><span>{anime.episodes} eps</span></>}
            </div>
            <p className="hero-desc">{anime.description}</p>
            <div className="hero-btns">
              <a href={anime.link} target="_blank" rel="noreferrer" className="btn-watch">
                <svg viewBox="0 0 20 20" fill="currentColor" style={{width:14,height:14}}>
                  <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
                </svg>
                Watch Now
              </a>
              <button className="btn-info" onClick={() => onInfo(anime)}>More Info</button>
            </div>
          </div>

          <button className="hero-arrow hero-arrow-left" onClick={onPrev}>&#8249;</button>
          <button className="hero-arrow hero-arrow-right" onClick={onNext}>&#8250;</button>

          <div className="hero-dots">
            {Array.from({length: Math.min(total, 10)}).map((_,i) => (
              <button key={i} className={'hero-dot-btn' + (i===heroIdx?' active':'')}
                style={{width: i===heroIdx ? 22 : 6}}/>
            ))}
          </div>
        </div>
      );
    }

    function Modal({ anime, onClose }) {
      useEffect(() => {
        const h = e => { if (e.key==='Escape') onClose(); };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [onClose]);
      if (!anime) return null;
      return (
        <div className="modal-backdrop" onClick={onClose}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-banner">
              <img src={anime.banner||anime.image} alt=""/>
              <div className="modal-banner-fade"/>
            </div>
            <button className="modal-close" onClick={onClose}>✕</button>
            <div className="modal-body">
              <img className="modal-cover" src={anime.image} alt={anime.title}
                onError={e => e.target.style.display='none'}/>
              <div>
                <h2 className="modal-title">{anime.title}</h2>
                <div className="modal-genres">
                  {anime.genres.map(g => <GenreTag key={g} label={g}/>)}
                </div>
                <div className="modal-meta">
                  <Stars score={anime.rating}/>
                  <span>{anime.rating}%</span>
                  <span>·</span>
                  <span>{anime.year}</span>
                  <span>·</span>
                  <span>{anime.episodes||'?'} episodes</span>
                </div>
                <p className="modal-desc">{anime.description||'No description available.'}</p>
                <a href={anime.link} target="_blank" rel="noreferrer" className="btn-watch"
                  style={{display:'inline-flex', textDecoration:'none'}}>
                  <svg viewBox="0 0 20 20" fill="currentColor" style={{width:14,height:14}}>
                    <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
                  </svg>
                  View on AniList ↗
                </a>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function SearchBar({ onSelect }) {
      const [q, setQ] = useState('');
      const [results, setResults] = useState([]);
      const [open, setOpen] = useState(false);
      const timerRef = useRef(null);
      const wrapRef = useRef(null);

      useEffect(() => {
        const h = e => { if (!wrapRef.current?.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
      }, []);

      const doSearch = useCallback(async (val) => {
        if (!val.trim()) { setResults([]); setOpen(false); return; }
        const data = await gql(SEARCH_Q, { search: val });
        const list = (data.data?.Page?.media || []).map(mapAnime);
        setResults(list);
        setOpen(true);
      }, []);

      const onChange = e => {
        const v = e.target.value;
        setQ(v);
        clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => doSearch(v), 350);
      };

      return (
        <div className="search-wrap" ref={wrapRef}>
          <svg className="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input className="search-input" value={q} onChange={onChange}
            placeholder="Search anime…"
            onFocus={() => results.length && setOpen(true)}/>
          {open && results.length > 0 && (
            <div className="search-dropdown">
              {results.map(a => (
                <div key={a.id} className="search-item"
                  onClick={() => { onSelect(a); setOpen(false); setQ(''); }}>
                  <img src={a.image} alt={a.title} onError={e=>e.target.style.display='none'}/>
                  <div style={{minWidth:0}}>
                    <div className="search-item-title">{a.title}</div>
                    <div className="search-item-meta">{a.year} · {a.episodes||'?'} eps</div>
                    <div style={{display:'flex',gap:4,marginTop:4}}>
                      {a.genres.slice(0,2).map(g=><GenreTag key={g} label={g}/>)}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [anime, setAnime] = useState([]);
      const [heroIdx, setHeroIdx] = useState(0);
      const [page, setPage] = useState(1);
      const [totalPages, setTotalPages] = useState(1);
      const [loading, setLoading] = useState(true);
      const [modal, setModal] = useState(null);
      const intervalRef = useRef(null);

      const load = useCallback(async (p) => {
        setLoading(true);
        const data = await gql(TRENDING_Q, { page: p, perPage: 50 });
        const list = (data.data?.Page?.media || []).map(mapAnime);
        setAnime(list);
        setTotalPages(data.data?.Page?.pageInfo?.lastPage || 1);
        setHeroIdx(0);
        setLoading(false);
      }, []);

      useEffect(() => { load(page); }, [page, load]);

      useEffect(() => {
        clearInterval(intervalRef.current);
        if (anime.length > 0) {
          intervalRef.current = setInterval(() => {
            setHeroIdx(i => (i + 1) % Math.min(anime.length, 10));
          }, 9000);
        }
        return () => clearInterval(intervalRef.current);
      }, [anime]);

      const prevHero = () => {
        setHeroIdx(i => (i - 1 + Math.min(anime.length, 10)) % Math.min(anime.length, 10));
      };
      const nextHero = () => {
        setHeroIdx(i => (i + 1) % Math.min(anime.length, 10));
      };

      const heroAnime = anime[heroIdx] || null;
      const heroCount = Math.min(anime.length, 10);

      const pages = [];
      const start = Math.max(1, page - 2);
      const end = Math.min(totalPages, start + 4);
      for (let i = start; i <= end; i++) pages.push(i);

      const changePage = (p) => {
        setPage(p);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      return (
        <>
          <nav>
            <a href="#" className="logo">
              <div className="logo-icon">
                <svg viewBox="0 0 20 20" fill="white" style={{width:14,height:14}}>
                  <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
                </svg>
              </div>
              <span className="logo-text">just<span>stream</span>anime</span>
            </a>
            <SearchBar onSelect={setModal}/>
          </nav>

          <Hero
            anime={heroAnime}
            onInfo={setModal}
            onPrev={prevHero}
            onNext={nextHero}
            heroIdx={heroIdx}
            total={heroCount}
          />

          <section className="grid-section">
            <div className="section-header">
              <h2 className="section-title">Trending Now</h2>
              <div className="section-line"/>
              <span className="section-page mono">pg {page} / {totalPages}</span>
            </div>

            {loading ? (
              <div className="anime-grid">
                {Array(20).fill(0).map((_,i) => <div key={i} className="skeleton"/>)}
              </div>
            ) : (
              <div className="anime-grid">
                {anime.map(a => <AnimeCard key={a.id} anime={a} onClick={setModal}/>)}
              </div>
            )}

            <div className="pagination">
              <button className="page-btn" disabled={page===1} onClick={() => changePage(page-1)}>‹</button>
              {pages.map(p => (
                <button key={p} className={'page-btn'+(p===page?' active':'')} onClick={() => changePage(p)}>{p}</button>
              ))}
              <button className="page-btn" disabled={page===totalPages} onClick={() => changePage(page+1)}>›</button>
            </div>
          </section>

          {modal && <Modal anime={modal} onClose={() => setModal(null)}/>}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
