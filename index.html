<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── AniList GraphQL ───────────────────────────────────────────────────────────
async function gql(q, v={}){
  const r = await fetch('https://graphql.anilist.co', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({query:q, variables:v})
  });
  return r.json();
}

// Include trailer field — AniList has it natively
const TQ = `query($p:Int,$pp:Int){Page(page:$p,perPage:$pp){pageInfo{lastPage}media(type:ANIME,sort:TRENDING_DESC){id idMal title{romaji english}coverImage{extraLarge large color}bannerImage description(asHtml:false)averageScore episodes seasonYear genres siteUrl trailer{id site}}}}`;
const SQ = `query($s:String){Page(perPage:12){media(search:$s,type:ANIME){id idMal title{romaji english}coverImage{extraLarge large color}bannerImage description(asHtml:false)averageScore episodes seasonYear genres siteUrl trailer{id site}}}}`;

function mapA(a){
  // Build trailer URL — fix Error 153 by using youtube-nocookie + strict referrer
  let trailerUrl = null;
  if(a.trailer?.id){
    if(a.trailer.site==='youtube'){
      // youtube-nocookie with NO referrer stripping — this is the exact fix for Error 153
      trailerUrl = `https://www.youtube-nocookie.com/embed/${a.trailer.id}?rel=0&modestbranding=1`;
    } else if(a.trailer.site==='dailymotion'){
      trailerUrl = `https://www.dailymotion.com/embed/video/${a.trailer.id}`;
    }
  }
  return {
    id:a.id, malId:a.idMal,
    title:a.title?.english||a.title?.romaji||'Unknown',
    romaji:a.title?.romaji||'',
    image:a.coverImage?.extraLarge||a.coverImage?.large,
    banner:a.bannerImage,
    desc:(a.description||'').replace(/<[^>]+>/g,''),
    rating:a.averageScore, year:a.seasonYear, eps:a.episodes,
    genres:a.genres||[], color:a.coverImage?.color||'#e11d48',
    trailerUrl,
  };
}

// ── VidNest Servers ───────────────────────────────────────────────────────────
// VidNest accepts AniList ID directly. Multiple internal servers available.
// Two embed types: /anime/ (main) and /animepahe/ (animepahe source)
// Internal servers: lamda, primesrc, sigma, alfa, beta, gama, catflix, hexa, delta
const VIDNEST_SERVERS = ['lamda','primesrc','sigma','alfa','beta','gama','catflix','hexa','delta'];

function buildServers(anilistId, ep, lang){
  const e = ep || 1;
  const L = lang === 'dub' ? 'dub' : 'sub';
  // Build VidNest URLs with different internal servers
  // Each numbered button switches the ?server= param — same clean player, different CDN
  return VIDNEST_SERVERS.map((srv, i) => ({
    label: `${i+1}`,
    url: `https://vidnest.fun/anime/${anilistId}/${e}/${L}?server=${srv}`,
  })).concat([
    // AnimePahe source as extra servers (10, 11)
    { label:'10', url:`https://vidnest.fun/animepahe/${anilistId}/${e}/${L}` },
    // MegaPlay as final fallback (11)
    { label:'11', url:`https://megaplay.buzz/stream/ani/${anilistId}/${e}/${L}` },
  ]);
}

// ── Nyaa torrent RSS — multi-strategy search ──────────────────────────────────
const PROXY = 'https://api.allorigins.win/get?url=';

async function fetchRSS(url){
  const r = await fetch(PROXY+encodeURIComponent(url), {signal:AbortSignal.timeout(12000)});
  const d = await r.json();
  if(!d?.contents) return [];
  const xml   = new DOMParser().parseFromString(d.contents,'text/xml');
  const items = Array.from(xml.querySelectorAll('item'));
  return items.slice(0,12).map(x=>{
    const guid   = x.querySelector('guid')?.textContent?.trim()||'';
    const nyaaId = guid.match(/\/view\/(\d+)/)?.[1]||'';
    const link   = x.querySelector('link')?.nextSibling?.textContent?.trim()
                 ||x.querySelector('link')?.textContent?.trim()||'';
    return {
      name:    x.querySelector('title')?.textContent?.trim()||'',
      magnet:  link.startsWith('magnet:')?link:'',
      torrent: nyaaId?`https://nyaa.si/download/${nyaaId}.torrent`:'',
      size:    x.querySelector('nyaa\\:size,[localName="size"]')?.textContent||'',
      seeds:   x.querySelector('nyaa\\:seeders,[localName="seeders"]')?.textContent||'?',
    };
  }).filter(x=>x.name&&(x.torrent||x.magnet));
}

async function getTorrents(anime, ep){
  const pad = String(ep).padStart(2,'0');
  const rom = anime.romaji||anime.title;
  const queries = [
    `https://nyaa.si/?page=rss&q=${encodeURIComponent(rom+' '+pad)}&c=1_2&f=0`,
    `https://nyaa.si/?page=rss&q=${encodeURIComponent(rom+' - '+pad)}&c=1_2&f=0`,
    `https://nyaa.si/?page=rss&q=${encodeURIComponent(anime.title+' '+pad)}&c=1_2&f=0`,
    `https://nyaa.si/?page=rss&q=${encodeURIComponent(rom)}&c=1_2&f=0`,
  ];
  for(const url of queries){
    try{
      const res = await fetchRSS(url);
      if(res.length) return res;
    }catch{}
  }
  return [];
}

// ── Icons ─────────────────────────────────────────────────────────────────────
function PIco({s=16}){return<svg viewBox="0 0 20 20" fill="currentColor" style={{width:s,height:s}}><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg>}
function FilmIco(){return<svg viewBox="0 0 20 20" fill="currentColor" style={{width:12,height:12}}><path fillRule="evenodd" d="M2 6a2 2 0 012-2h12a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zm2 0h2v2H4V6zm0 4h2v2H4v-2zm0 4h2v2H4v-2zm12-8h-2v2h2V6zm0 4h-2v2h2v-2zm0 4h-2v2h2v-2zM8 6h4v8H8V6z" clipRule="evenodd"/></svg>}
function DlIco(){return<svg viewBox="0 0 20 20" fill="currentColor" style={{width:11,height:11}}><path fillRule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clipRule="evenodd"/></svg>}
function MagIco(){return<svg viewBox="0 0 20 20" fill="currentColor" style={{width:11,height:11}}><path d="M4 4a2 2 0 012-2h8a2 2 0 012 2v4a6 6 0 01-12 0V4zm3 8a3 3 0 006 0v-.17A5.98 5.98 0 0110 12a5.98 5.98 0 01-3-.17V12z"/></svg>}
function Stars({s}){
  const n=Math.round(((s||0)/100)*5);
  return<span className="stars">{[1,2,3,4,5].map(i=><svg key={i} viewBox="0 0 20 20" fill="currentColor" style={{width:13,height:13,color:i<=n?'#fbbf24':'#2d2d3a'}}><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>)}</span>;
}
function GT({g}){return<span className="gtag">{g}</span>}

// ── Anime Card ────────────────────────────────────────────────────────────────
function ACard({a,onClick}){
  return<div className="ac" onClick={()=>onClick(a)}>
    <div className="act">
      <img className="acimg" src={a.image} alt={a.title} onError={e=>e.target.style.display='none'}/>
      <div className="acg"/>
      {a.rating&&<div className="acs">★ {a.rating}%</div>}
      <div className="acp"><div className="plc"><PIco s={20}/></div></div>
    </div>
    <div className="acb">
      <div className="act2">{a.title}</div>
      <div className="acm">{a.year||'—'}{a.eps&&<><span>·</span><span>{a.eps} eps</span></>}</div>
      {a.genres.length>0&&<div className="acgs">{a.genres.slice(0,2).map(g=><GT key={g} g={g}/>)}</div>}
    </div>
  </div>;
}

// ── Hero ──────────────────────────────────────────────────────────────────────
function Hero({a, onW, onPrev, onNext, idx, total}){
  const[loaded,setLoaded]=useState(false);
  useEffect(()=>setLoaded(false),[a?.id]);
  if(!a)return<div style={{height:'76vh',background:'#07070f'}}/>;
  return<div className="hero">
    <img className="hi" key={a.id} src={a.banner||a.image} alt=""
      style={{opacity:loaded?1:0}} onLoad={()=>setLoaded(true)} onError={()=>setLoaded(true)}/>
    <div style={{position:'absolute',bottom:0,left:0,right:0,height:200,pointerEvents:'none',
      background:`linear-gradient(to top,${a.color}40,transparent)`}}/>
    <div className="hfb"/><div className="hft"/>
    <div className="hc">
      <div className="hg">{a.genres.slice(0,4).map(g=><GT key={g} g={g}/>)}</div>
      <h1 className="ht">{a.title}</h1>
      <div className="hm">
        <Stars s={a.rating}/>&nbsp;
        <span style={{color:'#fbbf24',fontFamily:'Space Mono,monospace',fontSize:12}}>{a.rating}%</span>
        <span>·</span><span>{a.year}</span>
        {a.eps&&<><span>·</span><span>{a.eps} eps</span></>}
      </div>
      <p className="hd">{a.desc}</p>
      <div className="hbts">
        <button className="btn-r" onClick={()=>onW(a,'watch')}><PIco s={14}/>Watch Now</button>
        {a.trailerUrl&&
          <button className="btn-ghost" onClick={()=>onW(a,'trailer')}><FilmIco/> Trailer</button>
        }
      </div>
    </div>
    <button className="harr" style={{left:16}} onClick={onPrev}>&#8249;</button>
    <button className="harr" style={{right:16}} onClick={onNext}>&#8250;</button>
    <div className="hdots">
      {Array.from({length:Math.min(total,10)}).map((_,i)=>
        <button key={i} className={'hdot'+(i===idx?' on':'')} style={{width:i===idx?22:6}}/>
      )}
    </div>
  </div>;
}

// ── Search ────────────────────────────────────────────────────────────────────
function SearchBar({onSel}){
  const[q,setQ]=useState('');const[res,setRes]=useState([]);const[open,setOpen]=useState(false);
  const tmr=useRef(null);const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(!ref.current?.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);
  const run=useCallback(async val=>{
    if(!val.trim()){setRes([]);setOpen(false);return;}
    const d=await gql(SQ,{s:val});
    setRes((d.data?.Page?.media||[]).map(mapA));setOpen(true);
  },[]);
  const oc=e=>{setQ(e.target.value);clearTimeout(tmr.current);tmr.current=setTimeout(()=>run(e.target.value),380);};
  return<div className="sw" ref={ref}>
    <svg className="sico" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
    <input className="si" value={q} onChange={oc} placeholder="Search anime…"
      onFocus={()=>res.length&&setOpen(true)}/>
    {open&&res.length>0&&<div className="sdrop">
      {res.map(a=><div key={a.id} className="srow" onClick={()=>{onSel(a,'watch');setOpen(false);setQ('');}}>
        <img src={a.image} alt={a.title} onError={e=>e.target.style.display='none'}/>
        <div style={{minWidth:0}}><div className="sr-t">{a.title}</div><div className="sr-m">{a.year} · {a.eps||'?'} eps</div></div>
      </div>)}
    </div>}
  </div>;
}

// ── Watch Page ────────────────────────────────────────────────────────────────
function WatchPage({anime, startTab, onBack}){
  const totalEps = anime.eps||24;
  const epList   = Array.from({length:totalEps},(_,i)=>i+1);

  const [viewTab,  setViewTab]  = useState(startTab||'watch');
  const [curEp,    setCurEp]    = useState(1);
  const [lang,     setLang]     = useState('sub');
  const [servers,  setServers]  = useState([]);
  const [srvIdx,   setSrvIdx]   = useState(0);
  const [ifKey,    setIfKey]    = useState(0);
  const [spin,     setSpin]     = useState(true);
  const [torrents, setTorrents] = useState([]);
  const [torLoad,  setTorLoad]  = useState(false);
  const [epFilter, setEpFilter] = useState('');

  const loadEp = useCallback((ep, lng)=>{
    const L = lng||lang;
    const srvs = buildServers(anime.id, ep, L);
    setServers(srvs);
    setSrvIdx(0);
    setIfKey(k=>k+1);
    setSpin(true);
    setCurEp(ep);
    setTorLoad(true);
    setTorrents([]);
    getTorrents(anime, ep).then(res=>{ setTorrents(res); setTorLoad(false); });
  },[anime.id, lang]);

  useEffect(()=>{ loadEp(1,'sub'); },[]);

  const switchSrv = i => { setSrvIdx(i); setIfKey(k=>k+1); setSpin(true); };
  const switchLang= l => { setLang(l); loadEp(curEp,l); };
  const switchTab = t => { setViewTab(t); setSpin(true); setIfKey(k=>k+1); };

  const filtered = epFilter ? epList.filter(n=>String(n).includes(epFilter.trim())) : epList;

  // Active source — key fix: trailer uses strict-origin referrer, stream uses no-referrer-for-content
  const streamSrc  = servers[srvIdx]?.url||'';
  const trailerSrc = anime.trailerUrl||'';
  const activeSrc  = viewTab==='trailer' ? trailerSrc : streamSrc;
  // Trailer needs strict-origin-when-cross-origin to fix Error 153
  // Stream embeds should use no-referrer so they don't leak origin
  const refPolicy  = viewTab==='trailer' ? 'strict-origin-when-cross-origin' : 'no-referrer';

  return<div className="wp">
    <nav>
      <div className="logo" onClick={onBack}>
        <div className="logo-icon"><PIco s={14}/></div>
        <span className="logo-text">just<em>stream</em>anime</span>
      </div>
    </nav>
    <button className="wb" onClick={onBack}>
      <svg viewBox="0 0 20 20" fill="currentColor" style={{width:14,height:14}}>
        <path fillRule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clipRule="evenodd"/>
      </svg>
      Back
    </button>

    <div className="wl">
      {/* ── LEFT ── */}
      <div>
        {/* VIEW TABS */}
        <div className="vtabs">
          <button className={'vtab'+(viewTab==='watch'?' on':'')} onClick={()=>switchTab('watch')}>
            <PIco s={12}/>&nbsp; Watch
          </button>
          {trailerSrc&&
            <button className={'vtab'+(viewTab==='trailer'?' on':'')} onClick={()=>switchTab('trailer')}>
              <FilmIco/>&nbsp; Trailer
            </button>
          }
        </div>

        {/* PLAYER */}
        <div className="pw-wrap">
          {spin&&<div className="ph">
            <div className="ph-spin"/>
            <p className="ph-txt">{viewTab==='trailer'?'Loading trailer…':'Loading stream…'}</p>
          </div>}
          {activeSrc&&<iframe
            key={`${viewTab}-${ifKey}`}
            className="pif"
            src={activeSrc}
            allowFullScreen
            allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
            referrerPolicy={refPolicy}
            scrolling="no"
            onLoad={()=>setSpin(false)}
          />}
        </div>

        {/* SERVER CONTROLS — watch mode only */}
        {viewTab==='watch'&&<div className="srv-wrap">
          <div className="srv-top">
            <span className="srv-label">Server</span>
            <div className="lang-toggle">
              <button className={'ltbtn'+(lang==='sub'?' on':'')} onClick={()=>switchLang('sub')}>Sub</button>
              <button className={'ltbtn'+(lang==='dub'?' on':'')} onClick={()=>switchLang('dub')}>Dub</button>
            </div>
          </div>
          <div className="srv-grid">
            {servers.map((s,i)=>
              <button key={i} className={'stab'+(srvIdx===i?' on':'')} onClick={()=>switchSrv(i)}>
                {s.label}
              </button>
            )}
          </div>
        </div>}

        {/* INFO */}
        <div className="winfo">
          <h1 className="wt">{anime.title}</h1>
          <div className="wm">
            <Stars s={anime.rating}/>&nbsp;
            <span>{anime.rating}%</span><span>·</span><span>{anime.year}</span>
            {anime.eps&&<><span>·</span><span>{anime.eps} eps</span></>}
            {viewTab==='watch'&&<span className="ep-badge">EP {curEp}</span>}
          </div>
          <div className="acgs" style={{marginBottom:10}}>
            {anime.genres.slice(0,5).map(g=><GT key={g} g={g}/>)}
          </div>
          <p className="wd">{anime.desc}</p>
        </div>

        {/* DOWNLOADS */}
        {viewTab==='watch'&&<div className="dls">
          <div className="dlh">Download — Episode {curEp}</div>
          {torLoad&&<div className="dl-spin">Searching for download links…</div>}
          {!torLoad&&torrents.length===0&&
            <div className="dl-none">No downloads found for episode {curEp}. Try a different episode number.</div>
          }
          {!torLoad&&torrents.length>0&&<div className="dll">
            {torrents.map((t,i)=>{
              const q   = t.name.match(/1080|720|480|360/)?.[0]||'';
              const grp = t.name.match(/^\[([^\]]+)\]/)?.[1]||'';
              return<div key={i} className="dlr">
                <div className="dl-top">
                  <div className="dl-name" title={t.name}>{t.name.replace(/\.[^.]+$/,'').slice(0,70)}</div>
                  <div className="dl-btns">
                    {t.torrent&&<a href={t.torrent} className="db dbdl" target="_blank" rel="noreferrer">
                      <DlIco/> Download
                    </a>}
                    {t.magnet&&t.magnet.startsWith('magnet:')&&
                      <a href={t.magnet} className="db dbmag"><MagIco/> Magnet</a>
                    }
                  </div>
                </div>
                <div className="dl-meta">
                  {[grp, q&&`${q}p`, t.size, `${t.seeds} seeds`].filter(Boolean).join('  ·  ')}
                </div>
              </div>;
            })}
          </div>}
        </div>}
      </div>

      {/* ── SIDEBAR ── */}
      <div className="eps">
        <div className="eph">Episodes ({totalEps})</div>
        <input className="ep-filter" type="number" min="1" max={totalEps}
          placeholder="Jump to ep…" value={epFilter}
          onChange={e=>setEpFilter(e.target.value)}/>
        <div className="epl">
          {filtered.map(n=>
            <button key={n} className={'epb'+(curEp===n&&viewTab==='watch'?' on':'')}
              onClick={()=>{ setViewTab('watch'); loadEp(n,lang); }}>
              <span className="epn">EP {n}</span>
              <span className="epna">Episode {n}</span>
            </button>
          )}
        </div>
      </div>
    </div>
  </div>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const[view,  setView]  = useState('home');
  const[wa,    setWa]    = useState(null);
  const[wTab,  setWTab]  = useState('watch');
  const[anime, setAnime] = useState([]);
  const[hi,    setHi]    = useState(0);
  const[page,  setPage]  = useState(1);
  const[tpg,   setTpg]   = useState(1);
  const[load,  setLoad]  = useState(true);
  const iv = useRef(null);

  const fetchPage = useCallback(async p=>{
    setLoad(true);
    const d = await gql(TQ,{p,pp:50});
    setAnime((d.data?.Page?.media||[]).map(mapA));
    setTpg(d.data?.Page?.pageInfo?.lastPage||1);
    setHi(0); setLoad(false);
  },[]);

  useEffect(()=>{ fetchPage(page); },[page,fetchPage]);
  useEffect(()=>{
    clearInterval(iv.current);
    if(anime.length&&view==='home')
      iv.current=setInterval(()=>setHi(i=>(i+1)%Math.min(anime.length,10)),9000);
    return()=>clearInterval(iv.current);
  },[anime,view]);

  const openW=(a,tab='watch')=>{ setWa(a); setWTab(tab); setView('watch'); window.scrollTo({top:0}); };
  const goHome=()=>{ setView('home'); setWa(null); };
  const hMax = Math.min(anime.length,10);
  const ps=[]; const s=Math.max(1,page-2), e2=Math.min(tpg,s+4);
  for(let i=s;i<=e2;i++) ps.push(i);
  const chPg=p=>{ setPage(p); window.scrollTo({top:0,behavior:'smooth'}); };

  if(view==='watch'&&wa)
    return<WatchPage anime={wa} startTab={wTab} onBack={goHome}/>;

  return<>
    <nav>
      <div className="logo" onClick={goHome}>
        <div className="logo-icon"><PIco s={14}/></div>
        <span className="logo-text">just<em>stream</em>anime</span>
      </div>
      <SearchBar onSel={openW}/>
    </nav>

    <Hero a={anime[hi]||null} onW={openW}
      onPrev={()=>setHi(i=>(i-1+hMax)%hMax)}
      onNext={()=>setHi(i=>(i+1)%hMax)}
      idx={hi} total={hMax}/>

    <section className="gs">
      <div className="gsh">
        <h2 className="gst">Trending Now</h2>
        <div className="gsl"/>
        <span className="gsp" style={{fontFamily:'Space Mono,monospace'}}>pg {page}/{tpg}</span>
      </div>
      {load
        ?<div className="agrid">{Array(20).fill(0).map((_,i)=><div key={i} className="sk"/>)}</div>
        :<div className="agrid">{anime.map(a=><ACard key={a.id} a={a} onClick={openW}/>)}</div>}
      <div className="pag">
        <button className="pb" disabled={page===1} onClick={()=>chPg(page-1)}>‹</button>
        {ps.map(p=><button key={p} className={'pb'+(p===page?' on':'')} onClick={()=>chPg(p)}>{p}</button>)}
        <button className="pb" disabled={page===tpg} onClick={()=>chPg(page+1)}>›</button>
      </div>
    </section>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
