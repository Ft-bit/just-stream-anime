<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>JustStreamAnime</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --red:#e11d48; --red2:#9f1239; --glow:rgba(225,29,72,.32);
      --bg:#07070e; --bg2:#0e0e1b; --bg3:#141422;
      --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.13);
      --txt:#e4e4f0; --txt2:#8888a6; --txt3:#44445a;
      --mono:'JetBrains Mono',monospace;
      --nav:64px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
    img{display:block;max-width:100%}
    button{font-family:'Outfit',sans-serif;cursor:pointer}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:#e11d4840;border-radius:2px}

    /* ── TOP NAV ── */
    .nav{
      position:fixed;top:0;left:0;right:0;z-index:500;
      height:var(--nav);display:flex;align-items:center;gap:12px;
      padding:0 clamp(1rem,4vw,2.5rem);
      background:rgba(7,7,14,.95);
      backdrop-filter:blur(24px) saturate(180%);
      border-bottom:1px solid var(--border);
    }
    .logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
    .logo-mark{
      width:32px;height:32px;border-radius:9px;flex-shrink:0;
      background:linear-gradient(135deg,var(--red),var(--red2));
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 3px 14px var(--glow);
    }
    .logo-name{
      font-size:clamp(14px,3.5vw,17px);font-weight:900;
      letter-spacing:-.025em;white-space:nowrap;
    }
    .logo-name em{color:var(--red);font-style:normal}
    .nav-search{flex:1;min-width:0;position:relative}
    .nav-inp{
      width:100%;font-family:var(--mono);
      font-size:clamp(11px,2.5vw,13px);
      background:rgba(255,255,255,.05);
      border:1px solid var(--border);color:var(--txt);
      padding:9px 12px 9px 36px;border-radius:10px;outline:none;
      transition:border-color .2s,background .2s;
    }
    .nav-inp:focus{border-color:rgba(225,29,72,.5);background:rgba(255,255,255,.08)}
    .nav-ico{
      position:absolute;left:10px;top:50%;transform:translateY(-50%);
      width:15px;height:15px;color:var(--txt3);pointer-events:none;
    }
    .search-drop{
      position:absolute;top:calc(100% + 8px);left:0;right:0;
      background:#12121f;border:1px solid var(--border2);
      border-radius:14px;overflow:hidden;
      box-shadow:0 24px 60px rgba(0,0,0,.8);z-index:600;
      max-height:70vh;overflow-y:auto;
    }
    .s-row{
      display:flex;align-items:center;gap:12px;
      padding:10px 14px;border-bottom:1px solid var(--border);
      cursor:pointer;transition:background .15s;
    }
    .s-row:last-child{border-bottom:none}
    .s-row:hover,.s-row:active{background:rgba(255,255,255,.05)}
    .s-row img{width:38px;height:54px;border-radius:7px;object-fit:cover;flex-shrink:0}
    .s-title{font-weight:700;font-size:13px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .s-meta{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-top:2px}

    /* ── HERO ── */
    .hero{
      position:relative;
      /* min-height accounts for nav so content never goes behind it on mobile */
      min-height:clamp(520px,92vh,820px);
      overflow:hidden;display:flex;align-items:flex-end;
    }
    /* Fade at top covers nav overlap cleanly */
    .hero-nav-fade{
      position:absolute;top:0;left:0;right:0;
      height:calc(var(--nav) + 40px);
      background:linear-gradient(to bottom,rgba(7,7,14,.85),transparent);
      pointer-events:none;z-index:1;
    }
    .hero-img{
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;object-position:center top;
      filter:brightness(.42) saturate(1.1);
      transition:opacity .8s;
    }
    @media(max-width:600px){
      /* On mobile, show top of image (usually where characters are) */
      .hero-img{object-position:center 20%}
      /* Shrink hero height on mobile so content isn't squashed */
      .hero{min-height:clamp(440px,80vh,640px)}
    }
    .hero-grad{
      position:absolute;inset:0;
      background:
        linear-gradient(to top, var(--bg) 0%, rgba(7,7,14,.85) 35%, rgba(7,7,14,.2) 65%, transparent 100%),
        linear-gradient(to right, rgba(7,7,14,.92) 0%, transparent 65%);
    }
    @media(max-width:600px){
      /* Full dark overlay on mobile for readability */
      .hero-grad{
        background:
          linear-gradient(to top, var(--bg) 0%, rgba(7,7,14,.9) 40%, rgba(7,7,14,.5) 70%, rgba(7,7,14,.2) 100%),
          linear-gradient(to right, rgba(7,7,14,.8) 0%, transparent 100%);
      }
    }
    .hero-body{
      position:relative;z-index:2;
      padding:clamp(1rem,4vw,3.5rem) clamp(1rem,4vw,3.5rem);
      /* bottom padding gives room above page fold */
      padding-bottom:clamp(4rem,8vw,5rem);
      max-width:680px;width:100%;
    }
    /* On small screens, limit desc lines and hide tags to prevent overflow */
    @media(max-width:600px){
      .hero-desc{-webkit-line-clamp:2}
      .hero-tags{display:none}
      .hero-season-banner{font-size:10px;padding:3px 8px}
      /* On mobile, hero content should not go too high */
      .hero-body{
        padding-top:calc(var(--nav) + 1rem);
        padding-bottom:5rem;
      }
    }
    .hero-badge{
      display:inline-flex;align-items:center;gap:7px;
      font-family:var(--mono);font-size:clamp(10px,2vw,11px);font-weight:700;
      text-transform:uppercase;letter-spacing:.14em;color:var(--red);
      margin-bottom:12px;
    }
    .hero-badge::before{content:'';display:block;width:18px;height:2px;background:var(--red);border-radius:1px}
    .hero-title{
      font-size:clamp(1.35rem,5vw,3.5rem);
      font-weight:900;line-height:1.08;letter-spacing:-.03em;
      color:#fff;margin-bottom:10px;
      text-shadow:0 2px 24px rgba(0,0,0,.4);
      /* Clamp title to 3 lines on mobile */
      display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
    }
    @media(min-width:600px){
      .hero-title{display:block;overflow:visible}
    }
    /* Season info banner — always visible */
    .hero-season-banner{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(225,29,72,.12);border:1px solid rgba(225,29,72,.25);
      color:#fb7185;padding:4px 10px;border-radius:6px;
      font-family:var(--mono);font-size:clamp(10px,2vw,11px);font-weight:700;
      margin-bottom:10px;
    }
    .hero-meta{
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;
      font-family:var(--mono);font-size:clamp(11px,2.5vw,12px);color:var(--txt2);
      margin-bottom:12px;
    }
    .hero-score{
      color:#fbbf24;background:rgba(251,191,36,.12);
      border:1px solid rgba(251,191,36,.2);
      padding:3px 8px;border-radius:5px;font-weight:700;
    }
    .hero-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
    .htag{
      font-family:var(--mono);font-size:clamp(9px,2vw,10px);
      text-transform:uppercase;letter-spacing:.07em;
      padding:3px 8px;border-radius:4px;
      border:1px solid rgba(225,29,72,.28);color:#fb7185;background:rgba(225,29,72,.07);
    }
    .hero-desc{
      font-size:clamp(13px,2.5vw,14px);line-height:1.7;color:rgba(228,228,240,.8);
      margin-bottom:20px;
      display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
    }
    .hero-btns{display:flex;gap:10px;flex-wrap:wrap}
    .btn-play{
      display:inline-flex;align-items:center;gap:8px;
      padding:clamp(10px,3vw,13px) clamp(18px,4vw,26px);
      border-radius:11px;font-size:clamp(13px,3vw,14px);font-weight:700;color:#fff;
      background:linear-gradient(135deg,var(--red),var(--red2));
      box-shadow:0 5px 24px var(--glow);border:none;
      transition:transform .15s,box-shadow .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-play:active{transform:scale(.97)}
    .btn-info{
      display:inline-flex;align-items:center;gap:8px;
      padding:clamp(10px,3vw,13px) clamp(16px,4vw,22px);
      border-radius:11px;font-size:clamp(13px,3vw,14px);font-weight:700;color:var(--txt);
      background:rgba(255,255,255,.1);border:1px solid var(--border2);
      -webkit-tap-highlight-color:transparent;
      transition:background .15s;
    }
    .btn-info:active{background:rgba(255,255,255,.16)}
    /* Carousel arrows — visible on desktop, hidden mobile (swipe instead) */
    .harr{
      position:absolute;top:50%;transform:translateY(-50%);z-index:10;
      width:44px;height:44px;border-radius:50%;
      background:rgba(7,7,14,.7);border:1px solid rgba(255,255,255,.2);
      color:#fff;font-size:22px;
      display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;transition:all .2s;
      backdrop-filter:blur(8px);
    }
    .harr:hover{background:var(--red);border-color:var(--red);transform:translateY(-50%) scale(1.08)}
    .harr:active{transform:translateY(-50%) scale(.95)}
    @media(max-width:600px){.harr{display:none}}

    /* Progress dots — redesigned as pill strip */
    .hdots{
      position:absolute;bottom:1.2rem;left:50%;transform:translateX(-50%);
      display:flex;align-items:center;gap:5px;z-index:10;
      background:rgba(0,0,0,.35);backdrop-filter:blur(8px);
      padding:6px 10px;border-radius:20px;
    }
    .hdot{
      height:5px;border-radius:3px;
      background:rgba(255,255,255,.3);border:none;cursor:pointer;
      transition:width .35s cubic-bezier(.4,0,.2,1),background .35s;
      flex-shrink:0;
    }
    .hdot.on{background:var(--red);width:22px !important}

    /* Auto-progress bar at very top of hero */
    .hero-progress{
      position:absolute;top:0;left:0;height:3px;
      background:linear-gradient(to right,var(--red),#ff6b8a);
      z-index:10;transition:none;border-radius:0 2px 2px 0;
    }

    /* Mobile swipe hint */
    .swipe-hint{
      display:none;
      position:absolute;bottom:3.5rem;left:50%;transform:translateX(-50%);
      font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.4);
      letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;
    }
    @media(max-width:600px){.swipe-hint{display:block}}

    /* ── TABS ── */
    .tabs-bar{
      display:flex;gap:6px;overflow-x:auto;
      padding:clamp(.7rem,2.5vw,1.2rem) clamp(.75rem,3.5vw,2.5rem);
      scrollbar-width:none;-webkit-overflow-scrolling:touch;
      /* Ensure it doesn't cause horizontal page overflow */
      max-width:100vw;
    }
    .tabs-bar::-webkit-scrollbar{display:none}
    .tbtn{
      font-family:var(--mono);font-size:clamp(11px,2.5vw,12px);font-weight:700;
      padding:clamp(7px,2vw,9px) clamp(14px,3vw,18px);
      border-radius:9px;flex-shrink:0;border:1px solid;
      transition:all .15s;-webkit-tap-highlight-color:transparent;
    }
    .tbtn.off{border-color:var(--border);background:rgba(255,255,255,.04);color:var(--txt2)}
    .tbtn.off:active{background:rgba(255,255,255,.08)}
    .tbtn.on{border-color:transparent;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;box-shadow:0 3px 14px var(--glow)}

    /* ── GRID ── */
    .section{padding:0 clamp(.75rem,3.5vw,2.5rem) clamp(1.2rem,3vw,3rem)}
    .sec-hdr{display:flex;align-items:center;gap:11px;margin-bottom:clamp(1rem,3vw,1.5rem)}
    .sec-bar{width:4px;height:20px;border-radius:2px;background:linear-gradient(to bottom,var(--red),var(--red2));flex-shrink:0}
    .sec-title{font-size:clamp(1rem,3.5vw,1.2rem);font-weight:800;letter-spacing:-.02em;color:#fff}
    /* Responsive grid: 2 col on mobile, auto-fill on larger */
    .agrid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:clamp(8px,2vw,14px);
    }
    @media(min-width:480px){.agrid{grid-template-columns:repeat(3,1fr)}}
    @media(min-width:680px){.agrid{grid-template-columns:repeat(4,1fr)}}
    @media(min-width:900px){.agrid{grid-template-columns:repeat(5,1fr)}}
    @media(min-width:1200px){.agrid{grid-template-columns:repeat(6,1fr)}}

    /* ── ANIME CARD ── */
    .acard{
      cursor:pointer;border-radius:10px;overflow:hidden;
      background:var(--bg2);border:1px solid var(--border);
      -webkit-tap-highlight-color:transparent;
      transition:transform .2s cubic-bezier(.4,0,.2,1),box-shadow .2s;
    }
    @media(hover:hover){
      .acard:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 18px 40px rgba(0,0,0,.5);border-color:rgba(255,255,255,.15)}
      .acard:hover .acard-img{transform:scale(1.06)}
      .acard:hover .acard-play{opacity:1}
    }
    .acard:active{transform:scale(.97)}
    .acard-top{position:relative;overflow:hidden;padding-top:140%;background:#1a1a2e;border-radius:10px 10px 0 0}
    .acard-img{
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;transition:transform .4s cubic-bezier(.4,0,.2,1);
    }
    .acard-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--bg2) 0%,transparent 60%)}
    .acard-score{
      position:absolute;top:6px;right:6px;
      font-family:var(--mono);font-size:clamp(9px,2vw,11px);font-weight:700;
      color:#fbbf24;background:rgba(0,0,0,.78);
      backdrop-filter:blur(6px);padding:2px 6px;border-radius:5px;
    }
    /* Season label — key fix: always show which season this is */
    .acard-season{
      position:absolute;top:6px;left:6px;
      font-family:var(--mono);font-size:clamp(8px,1.8vw,9px);font-weight:700;
      text-transform:uppercase;letter-spacing:.04em;
      padding:2px 6px;border-radius:4px;
      background:rgba(225,29,72,.88);color:#fff;
    }
    .acard-play{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .2s;background:rgba(0,0,0,.38);
    }
    .acard-circle{
      width:clamp(40px,8vw,52px);height:clamp(40px,8vw,52px);border-radius:50%;
      background:linear-gradient(135deg,var(--red),var(--red2));
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 5px 20px var(--glow);
    }
    .acard-body{padding:clamp(8px,2vw,10px) clamp(8px,2vw,12px) clamp(10px,2vw,13px)}
    .acard-title{
      font-weight:700;font-size:clamp(11px,2.5vw,13px);
      color:var(--txt);line-height:1.35;margin-bottom:4px;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .acard-sub{
      font-family:var(--mono);font-size:clamp(9px,2vw,10px);color:var(--txt3);
      display:flex;gap:4px;align-items:center;flex-wrap:wrap;
    }
    .atag{
      font-family:var(--mono);font-size:clamp(8px,1.8vw,9px);
      text-transform:uppercase;letter-spacing:.05em;
      padding:2px 5px;border-radius:4px;
      border:1px solid rgba(225,29,72,.22);color:#fb7185;background:rgba(225,29,72,.06);
      white-space:nowrap;
    }
    .acard-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
    .sk{background:linear-gradient(90deg,#1a1a2e 25%,#22223a 50%,#1a1a2e 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:10px;padding-top:140%}
    @keyframes shimmer{to{background-position:-200% 0}}

    /* ── PAGINATION ── */
    .pag{
      display:flex;justify-content:center;align-items:center;
      gap:clamp(5px,1.5vw,7px);
      padding:clamp(.8rem,3vw,1.2rem) clamp(1rem,4vw,2.5rem) clamp(1.5rem,4vw,3rem);
      flex-wrap:wrap;
    }
    .pgb{
      min-width:clamp(32px,8vw,36px);height:clamp(32px,8vw,36px);
      padding:0 8px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-family:var(--mono);font-size:clamp(11px,2.5vw,13px);font-weight:700;
      background:rgba(255,255,255,.05);border:1px solid var(--border);
      color:var(--txt2);transition:all .15s;-webkit-tap-highlight-color:transparent;
    }
    .pgb:active{background:rgba(255,255,255,.1)}
    .pgb.on{background:linear-gradient(135deg,var(--red),var(--red2));border-color:transparent;color:#fff;box-shadow:0 0 16px var(--glow)}
    .pgb:disabled{opacity:.2;cursor:default}

    /* ── WATCH PAGE ── */
    .wp{min-height:100vh;background:var(--bg);padding-top:var(--nav)}
    .wp-wrap{max-width:1440px;margin:0 auto;padding:0 clamp(1rem,4vw,2rem) 4rem}
    .wp-back{
      display:inline-flex;align-items:center;gap:7px;
      font-family:var(--mono);font-size:clamp(11px,2.5vw,12px);color:var(--txt2);
      background:none;border:none;padding:clamp(.8rem,3vw,1.2rem) 0;
      transition:color .15s;-webkit-tap-highlight-color:transparent;
    }
    .wp-back:active{color:var(--txt)}
    /* Stack on mobile, side-by-side on desktop */
    .wp-layout{display:grid;grid-template-columns:1fr;gap:16px}
    @media(min-width:960px){.wp-layout{grid-template-columns:1fr 290px}}

    /* PLAYER */
    .player-wrap{
      background:#000;border-radius:clamp(10px,2vw,16px);overflow:hidden;
      aspect-ratio:16/9;position:relative;
      box-shadow:0 10px 44px rgba(0,0,0,.7);margin-bottom:14px;
    }
    .player-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block}
    .player-loading{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:14px;
      background:#09091a;z-index:2;pointer-events:none;
    }
    .spin-ring{
      width:50px;height:50px;border-radius:50%;
      border:3px solid rgba(225,29,72,.15);border-top-color:var(--red);
      animation:spin .9s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin-txt{font-family:var(--mono);font-size:clamp(10px,2.5vw,11px);color:var(--txt3);text-align:center}

    /* QUALITY TIP */

    /* VIEW TABS */
    .vtabs{display:flex;gap:6px;margin-bottom:12px}
    .vtab{
      font-family:var(--mono);font-size:clamp(11px,2.5vw,12px);font-weight:700;
      padding:clamp(7px,2vw,9px) clamp(14px,3vw,18px);
      border-radius:9px;border:1px solid var(--border);
      background:rgba(255,255,255,.04);color:var(--txt2);
      transition:all .15s;-webkit-tap-highlight-color:transparent;
    }
    .vtab:active,.vtab:hover{background:rgba(255,255,255,.09);color:var(--txt)}
    .vtab.on{background:linear-gradient(135deg,var(--red),var(--red2));border-color:transparent;color:#fff;box-shadow:0 3px 14px var(--glow)}

    /* SERVER PANEL */
    .srv-panel{
      background:var(--bg2);border:1px solid var(--border);
      border-radius:13px;padding:clamp(12px,3vw,16px);margin-bottom:14px;
    }
    /* Server buttons — make touch targets bigger on mobile */
    @media(max-width:480px){
      .srv-btns{gap:5px}
      .sbtn{min-width:38px;height:38px;padding:0 10px;font-size:12px;
        display:flex;align-items:center;justify-content:center}
    }
    .srv-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:8px}
    .srv-label{font-family:var(--mono);font-size:clamp(9px,2vw,10px);font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.12em}
    .lang-pills{display:flex;gap:5px}
    .lpill{
      font-family:var(--mono);font-size:clamp(10px,2.5vw,11px);font-weight:700;
      padding:4px 12px;border-radius:6px;
      border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--txt3);
      transition:all .15s;-webkit-tap-highlight-color:transparent;
    }
    .lpill:active,.lpill:hover{background:rgba(255,255,255,.08);color:var(--txt)}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Anime Database API ──────────────────────────────────────────────────────
async function gql(query, vars={}){
  const r = await fetch('https://graphql.anilist.co',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({query,variables:vars})
  });
  return r.json();
}

const F = `id idMal title{romaji english}coverImage{extraLarge large color}bannerImage description(asHtml:false)averageScore episodes seasonYear season format genres siteUrl trailer{id site}`;
const Qs = {
  trending: `query($p:Int){Page(page:$p,perPage:30){pageInfo{lastPage}media(type:ANIME,sort:TRENDING_DESC,isAdult:false){${F}}}}`,
  popular:  `query($p:Int){Page(page:$p,perPage:30){pageInfo{lastPage}media(type:ANIME,sort:POPULARITY_DESC,isAdult:false){${F}}}}`,
  top:      `query($p:Int){Page(page:$p,perPage:30){pageInfo{lastPage}media(type:ANIME,sort:SCORE_DESC,isAdult:false){${F}}}}`,
  airing:   `query($p:Int){Page(page:$p,perPage:30){pageInfo{lastPage}media(type:ANIME,status:RELEASING,sort:TRENDING_DESC,isAdult:false){${F}}}}`,
  search:   `query($s:String){Page(perPage:14){media(search:$s,type:ANIME,isAdult:false){${F}}}}`,
};

function mapA(a){
  const fmtRaw = (a.format||'TV').replace(/_/g,' ');
  const seasonName = a.season
    ? a.season.charAt(0)+a.season.slice(1).toLowerCase()+' '+a.seasonYear
    : (a.seasonYear||'');
  let trailerUrl = null;
  if(a.trailer?.id){
    if(a.trailer.site==='youtube')
      trailerUrl=`https://www.youtube-nocookie.com/embed/${a.trailer.id}?rel=0&modestbranding=1`;
    else if(a.trailer.site==='dailymotion')
      trailerUrl=`https://www.dailymotion.com/embed/video/${a.trailer.id}`;
  }
  return{
    id:a.id, malId:a.idMal,
    title:a.title?.english||a.title?.romaji||'Unknown',
    romaji:a.title?.romaji||'',
    image:a.coverImage?.extraLarge||a.coverImage?.large,
    banner:a.bannerImage,
    desc:(a.description||'').replace(/<[^>]+>/g,''),
    rating:a.averageScore, year:a.seasonYear, eps:a.episodes,
    genres:a.genres||[], color:a.coverImage?.color||'#e11d48',
    format:fmtRaw, season:seasonName, trailerUrl,
  };
}

// Series needing season-priority fix (S1-S4 mapped by unique ID)
const FIXED_IDS = new Set([98659,145545,146066,180745]);

function buildServers(id,ep,lang){
  const e=ep||1, L=lang==='dub'?'dub':'sub';
  const fixed=FIXED_IDS.has(Number(id));
  
  
  return fixed ? [
    {n:'1',url:`https://megaplay.buzz/stream/ani/${id}/${e}/sub`},
    {n:'2',url:`https://megaplay.buzz/stream/ani/${id}/${e}/dub`},
    {n:'3',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=lamda`},
    {n:'4',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=primesrc`},
    {n:'5',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=sigma`},
    {n:'6',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=alfa`},
    {n:'7',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=gama`},
    {n:'8',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=catflix`},
    {n:'9',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=hexa`},
    {n:'10',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=delta`},
    {n:'11',url:`https://vidnest.fun/animepahe/${id}/${e}/${L}`},
  ] : [
    {n:'1',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=lamda`},
    {n:'2',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=primesrc`},
    {n:'3',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=sigma`},
    {n:'4',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=alfa`},
    {n:'5',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=beta`},
    {n:'6',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=gama`},
    {n:'7',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=catflix`},
    {n:'8',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=hexa`},
    {n:'9',url:`https://vidnest.fun/anime/${id}/${e}/${L}?server=delta`},
    {n:'10',url:`https://vidnest.fun/animepahe/${id}/${e}/${L}`},
    {n:'11',url:`https://megaplay.buzz/stream/ani/${id}/${e}/${L}`},
  ];
}

// ── Icons ─────────────────────────────────────────────────────────────────────
const PIco=({s=16})=><svg viewBox="0 0 20 20" fill="currentColor" style={{width:s,height:s}}><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg>;
const FilmIco=()=><svg viewBox="0 0 20 20" fill="currentColor" style={{width:13,height:13}}><path fillRule="evenodd" d="M2 6a2 2 0 012-2h12a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zm2 0h2v2H4V6zm0 4h2v2H4v-2zm0 4h2v2H4v-2zm12-8h-2v2h2V6zm0 4h-2v2h2v-2zm0 4h-2v2h2v-2zM8 6h4v8H8V6z" clipRule="evenodd"/></svg>;
const BackIco=()=><svg viewBox="0 0 20 20" fill="currentColor" style={{width:14,height:14}}><path fillRule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clipRule="evenodd"/></svg>;


function Stars({s}){
  const n=Math.round(((s||0)/100)*5);
  return<span className="stars">{[1,2,3,4,5].map(i=><svg key={i} viewBox="0 0 20 20" fill="currentColor" style={{width:12,height:12,color:i<=n?'#fbbf24':'#222230'}}><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>)}</span>;
}

// ── Anime Card ────────────────────────────────────────────────────────────────
function AnimeCard({a,onPlay}){
  return<div className="acard" onClick={()=>onPlay(a)}>
    <div className="acard-top">
      <img className="acard-img" src={a.image} alt={a.title} loading="lazy"
        onError={e=>{e.target.style.display='none'}}/>
      <div className="acard-grad"/>
      {a.rating&&<div className="acard-score">★ {a.rating}%</div>}
      {/* Season label on every card */}
      {a.season&&<div className="acard-season">{a.season}</div>}
      <div className="acard-play"><div className="acard-circle"><PIco s={18}/></div></div>
    </div>
    <div className="acard-body">
      <div className="acard-title">{a.title}</div>
      <div className="acard-sub">
        <span>{a.format}</span>
        {a.eps&&<><span>·</span><span>{a.eps} eps</span></>}
      </div>
      {a.genres.length>0&&<div className="acard-tags">{a.genres.slice(0,2).map(g=><span key={g} className="atag">{g}</span>)}</div>}
    </div>
  </div>;
}

// ── Hero ──────────────────────────────────────────────────────────────────────
function Hero({items,onPlay}){
  const INTERVAL = 10000; // ms per slide
  const[idx,setIdx]=useState(0);
  const[loaded,setLoaded]=useState(false);
  const[progress,setProgress]=useState(0);
  const iv=useRef(null);
  const pv=useRef(null);
  const touchX=useRef(null);
  const progressRef=useRef(0);

  const startTimer=(startFrom=0)=>{
    clearInterval(iv.current);clearInterval(pv.current);
    progressRef.current=startFrom;
    setProgress(startFrom);
    const step=50;
    pv.current=setInterval(()=>{
      progressRef.current+=step;
      setProgress(progressRef.current);
      if(progressRef.current>=INTERVAL){
        progressRef.current=0;
        setProgress(0);
        setIdx(i=>(i+1)%Math.min(items.length,8));
        setLoaded(false);
      }
    },step);
  };

  useEffect(()=>{
    if(items.length) startTimer(0);
    return()=>{clearInterval(iv.current);clearInterval(pv.current)};
  },[items]);

  // Restart timer whenever idx changes
  const isFirst=useRef(true);
  useEffect(()=>{
    setLoaded(false);
    if(isFirst.current){isFirst.current=false;return}
    startTimer(0);
  },[idx]);

  const goTo=(i)=>{ setIdx(i); startTimer(0); };
  const prev=()=>goTo((idx-1+Math.min(items.length,8))%Math.min(items.length,8));
  const next=()=>goTo((idx+1)%Math.min(items.length,8));

  // Touch/swipe support
  const onTouchStart=e=>{touchX.current=e.touches[0].clientX};
  const onTouchEnd=e=>{
    if(touchX.current===null) return;
    const dx=e.changedTouches[0].clientX-touchX.current;
    if(Math.abs(dx)>40){dx<0?next():prev()}
    touchX.current=null;
  };

  if(!items.length)return<div style={{minHeight:'clamp(440px,80vh,640px)',background:'var(--bg)'}}/>;
  const a=items[idx],hMax=Math.min(items.length,8);
  const pct=Math.min((progress/INTERVAL)*100,100);

  return<div className="hero" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
    {/* Auto-progress bar */}
    <div className="hero-progress" style={{width:pct+'%'}}/>
    <img className="hero-img" key={a.id} src={a.banner||a.image} alt=""
      style={{opacity:loaded?1:0}} onLoad={()=>setLoaded(true)} onError={()=>setLoaded(true)}/>
    <div className="hero-grad"/>
    <div className="hero-nav-fade"/>
    <div className="hero-body">
      <div className="hero-badge">Trending Now</div>
      <h1 className="hero-title">{a.title}</h1>
      {a.season&&<div className="hero-season-banner">📅 {a.season} · {a.format}</div>}
      <div className="hero-meta">
        {a.rating&&<span className="hero-score">★ {a.rating}%</span>}
        {a.eps&&<span>{a.eps} Episodes</span>}
      </div>
      <div className="hero-tags">{a.genres.slice(0,5).map(g=><span key={g} className="htag">{g}</span>)}</div>
      <p className="hero-desc">{a.desc}</p>
      <div className="hero-btns">
        <button className="btn-play" onClick={()=>onPlay(a,'watch')}><PIco s={14}/>Watch Now</button>
        {a.trailerUrl&&<button className="btn-info" onClick={()=>onPlay(a,'trailer')}><FilmIco/> Trailer</button>}
      </div>
    </div>
    {/* Arrow nav — hidden on mobile, swipe instead */}
    <button className="harr" style={{left:16}} onClick={prev}>&#8249;</button>
    <button className="harr" style={{right:16}} onClick={next}>&#8250;</button>
    {/* Slide index */}
    <div className="hdots">
      {Array.from({length:hMax}).map((_,i)=>
        <button key={i} className={'hdot'+(i===idx?' on':'')}
          style={{width:i===idx?22:6}}
          onClick={()=>goTo(i)}/>
      )}
    </div>
    <p className="swipe-hint">← swipe →</p>
  </div>;
}

// ── Search Bar ────────────────────────────────────────────────────────────────
function SearchBar({onSel}){
  const[q,setQ]=useState('');const[res,setRes]=useState([]);const[open,setOpen]=useState(false);
  const tmr=useRef(null);const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(!ref.current?.contains(e.target))setOpen(false)};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);
  const run=useCallback(async v=>{
    if(!v.trim()){setRes([]);setOpen(false);return}
    const d=await gql(Qs.search,{s:v});
    setRes((d.data?.Page?.media||[]).map(mapA));setOpen(true);
  },[]);
  const oc=e=>{setQ(e.target.value);clearTimeout(tmr.current);tmr.current=setTimeout(()=>run(e.target.value),380)};
  return<div className="nav-search" ref={ref}>
    <svg className="nav-ico" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
    <input className="nav-inp" value={q} onChange={oc} placeholder="Search anime…"
      onFocus={()=>res.length&&setOpen(true)}/>
    {open&&res.length>0&&<div className="search-drop">
      {res.map(a=><div key={a.id} className="s-row" onClick={()=>{onSel(a);setOpen(false);setQ('')}}>
        <img src={a.image} alt={a.title} onError={e=>e.target.style.display='none'}/>
        <div style={{minWidth:0}}>
          <div className="s-title">{a.title}</div>
          <div className="s-meta">{a.season||a.year}{a.eps?` · ${a.eps} eps`:''} · {a.format}</div>
        </div>
      </div>)}
    </div>}
  </div>;
}

// ── Watch Page ────────────────────────────────────────────────────────────────
function WatchPage({anime,startTab,onBack}){
  const totalEps=anime.eps||24;

  // Special episode mapping — some anime premiere with combined episodes
  // CotE S4 (id=180745): EP1 was a 90-min special covering chapters 1-4
  // We still show all episode numbers so users can try each server
  const SPECIAL_NOTES = {
    180745: {1:'EP 1 (90-min special — covers eps 1–4 on some servers)'},
  };
  const specialNote = (SPECIAL_NOTES[Number(anime.id)])||{};

  const epList=Array.from({length:totalEps},(_,i)=>i+1);
  const[tab,setTab]=useState(startTab||'watch');
  const[curEp,setCurEp]=useState(1);
  const[lang,setLang]=useState('sub');
  const[servers,setServers]=useState([]);
  const[si,setSi]=useState(0);
  const[key,setKey]=useState(0);
  const[spin,setSpin]=useState(true);
  const[filter,setFilter]=useState('');

  const loadEp=useCallback((ep,lng)=>{
    const L=lng||lang;
    setServers(buildServers(anime.id,ep,L));
    setSi(0);setKey(k=>k+1);setSpin(true);setCurEp(ep);
  },[anime.id,lang]);
  useEffect(()=>{loadEp(1,'sub')},[]);

  const switchSrv=i=>{setSi(i);setKey(k=>k+1);setSpin(true)};
  const switchLang=l=>{setLang(l);loadEp(curEp,l)};
  const switchTab=t=>{setTab(t);setKey(k=>k+1);setSpin(true)};

  const filtered=filter?epList.filter(n=>String(n).includes(filter.trim())):epList;
  const src=tab==='trailer'?anime.trailerUrl:(servers[si]?.url||'');
  const refPolicy=tab==='trailer'?'strict-origin-when-cross-origin':'no-referrer';

  return<div className="wp">
    <div className="wp-wrap">
      <button className="wp-back" onClick={onBack}><BackIco/> Back to Browse</button>
      <div className="wp-layout">
        {/* LEFT */}
        <div>
          <div className="vtabs">
            <button className={'vtab'+(tab==='watch'?' on':'')} onClick={()=>switchTab('watch')}><PIco s={12}/>&nbsp; Watch</button>
            {anime.trailerUrl&&<button className={'vtab'+(tab==='trailer'?' on':'')} onClick={()=>switchTab('trailer')}><FilmIco/>&nbsp; Trailer</button>}
          </div>

          <div className="player-wrap">
            {spin&&<div className="player-loading"><div className="spin-ring"/><p className="spin-txt">{tab==='trailer'?'Loading trailer…':'Loading stream…'}</p></div>}
            {src&&<iframe key={`${tab}-${key}`} className="player-iframe" src={src}
              allowFullScreen allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
              referrerPolicy={refPolicy} scrolling="no" onLoad={()=>setSpin(false)}/>}
          </div>

          {tab==='watch'&&<>
            {/* Special episode notice — only shown for anime with known combined episodes */}
            {specialNote[curEp]&&<div style={{
              background:'rgba(251,191,36,.07)',border:'1px solid rgba(251,191,36,.2)',
              borderRadius:10,padding:'9px 14px',marginBottom:12,
              fontFamily:'var(--mono)',fontSize:11,color:'rgba(251,191,36,.85)',lineHeight:1.6
            }}>
              ℹ {specialNote[curEp]}. If EP 2–4 load the same content, try a different server.
            </div>}

            <div className="srv-panel">
              <div className="srv-head">
                <span className="srv-label">Server</span>
                <div className="lang-pills">
                  <button className={'lpill'+(lang==='sub'?' on':'')} onClick={()=>switchLang('sub')}>SUB</button>
                  <button className={'lpill'+(lang==='dub'?' on':'')} onClick={()=>switchLang('dub')}>DUB</button>
                </div>
              </div>
              <div className="srv-btns">
                {servers.map((s,i)=><button key={i} className={'sbtn'+(si===i?' on':'')} onClick={()=>switchSrv(i)}>{s.n}</button>)}
              </div>
            </div>
          </>}

          <div className="winfo">
            <h1 className="winfo-title">{anime.title}</h1>
            <div className="winfo-meta">
              <Stars s={anime.rating}/>
              {anime.rating&&<span>{anime.rating}%</span>}
              {anime.season&&<><span style={{color:'var(--txt3)'}}>·</span><span>{anime.season}</span></>}
              {anime.format&&<><span style={{color:'var(--txt3)'}}>·</span><span>{anime.format}</span></>}
              {anime.eps&&<><span style={{color:'var(--txt3)'}}>·</span><span>{anime.eps} eps</span></>}
              {tab==='watch'&&<span className="ep-pill">EP {curEp}</span>}
            </div>
            <div className="winfo-tags">{anime.genres.slice(0,6).map(g=><span key={g} className="atag">{g}</span>)}</div>
            <p className="winfo-desc">{anime.desc}</p>
          </div>
        </div>

        {/* EPISODE PANEL */}
        <div className="ep-panel">
          <div className="ep-panel-title">Episodes ({totalEps})</div>
          <input className="ep-filter" type="number" min="1" max={totalEps}
            placeholder="Jump to episode…" value={filter}
            onChange={e=>setFilter(e.target.value)}/>
          <div className="ep-list">
            {filtered.map(n=><button key={n} className={'epbtn'+(curEp===n&&tab==='watch'?' on':'')}
              onClick={()=>{setTab('watch');loadEp(n,lang)}}>
              <span className="ep-num">EP {n}</span>
              <span className="ep-name">{specialNote[n]||`Episode ${n}`}</span>
            </button>)}
          </div>
        </div>
      </div>
    </div>
  </div>;
}

// ── Hash routing helpers ──────────────────────────────────────────────────────
// Format: #home/trending/2  or  #watch/12345/watch
function readHash(){
  try{
    const raw=(window.location.hash||'').slice(1);
    const [sec,b,c]=raw.split('/');
    if(sec==='watch'&&b) return{view:'watch',animeId:b,wTab:c||'watch'};
    if(sec==='home') return{view:'home',tab:b||'trending',page:Math.max(1,parseInt(c)||1)};
  }catch(e){}
  return{view:'home',tab:'trending',page:1};
}
function writeHash(view,extra={}){
  if(view==='watch') window.location.hash=`#watch/${extra.id||''}/${extra.wTab||'watch'}`;
  else               window.location.hash=`#home/${extra.tab||'trending'}/${extra.page||1}`;
}

function App(){
  // Read initial state from URL hash — survives reload
  const init = readHash();

  const[view,    setView]  =useState(init.view);
  const[watching,setWatch] =useState(null);
  const[wTab,    setWTab]  =useState(init.wTab||'watch');
  const[tab,     setTab]   =useState(init.tab||'trending');
  const[page,    setPage]  =useState(init.page||1);
  const[totalPg, setTPg]   =useState(1);
  const[items,   setItems] =useState([]);
  const[hero,    setHero]  =useState([]);
  const[loading, setLoad]  =useState(true);

  // Cache anime objects by ID so watch page survives reload
  const cache = useRef({});

  const load=useCallback(async(t,p)=>{
    setLoad(true);
    const d=await gql(Qs[t],{p});
    const list=(d.data?.Page?.media||[]).map(mapA);
    list.forEach(a=>{ cache.current[String(a.id)]=a; });
    setItems(list);
    setTPg(d.data?.Page?.pageInfo?.lastPage||1);
    if(t==='trending'&&p===1) setHero(list);
    setLoad(false);
  },[]);

  // Boot: if hash says "watch", load trending first to fill cache, then restore
  const booted = useRef(false);
  useEffect(()=>{
    if(booted.current) return;
    booted.current=true;
    if(init.view==='watch'){
      // Load trending in background to populate cache
      (async()=>{
        setLoad(true);
        const d=await gql(Qs.trending,{p:1});
        const list=(d.data?.Page?.media||[]).map(mapA);
        list.forEach(a=>{ cache.current[String(a.id)]=a; });
        setHero(list);
        setItems(list);
        setTPg(d.data?.Page?.pageInfo?.lastPage||1);
        setLoad(false);
        const cached=cache.current[String(init.animeId)];
        if(cached){ setWatch(cached); setWTab(init.wTab||'watch'); setView('watch'); }
        else{
          // Anime not in trending — fall back to home, keep tab state
          setView('home');
          writeHash('home',{tab:'trending',page:1});
        }
      })();
    } else {
      load(init.tab||'trending', init.page||1);
    }
  },[]);

  // Tab changes always reset to page 1
  const prevTab=useRef(init.tab);
  useEffect(()=>{
    if(prevTab.current===tab) return; // skip on first render
    prevTab.current=tab;
    setPage(1);
    load(tab,1);
    writeHash('home',{tab,page:1});
  },[tab]);

  useEffect(()=>{
    if(page>1){ load(tab,page); }
  },[page]);

  // Navigation
  const openWatch=(a,t='watch')=>{
    cache.current[String(a.id)]=a;
    setWatch(a); setWTab(t); setView('watch');
    writeHash('watch',{id:a.id,wTab:t});
    window.scrollTo({top:0});
  };
  const goHome=()=>{
    setView('home'); setWatch(null);
    writeHash('home',{tab,page});
    window.scrollTo({top:0});
  };
  const chPg=p=>{
    setPage(p);
    writeHash('home',{tab,page:p});
    window.scrollTo({top:0,behavior:'smooth'});
  };

  // Browser back/forward button support
  useEffect(()=>{
    const onPop=()=>{
      const h=readHash();
      if(h.view==='watch'){
        const cached=cache.current[String(h.animeId)];
        if(cached){ setWatch(cached); setWTab(h.wTab); setView('watch'); }
        else{ setView('home'); }
      } else {
        setView('home'); setWatch(null);
        setTab(h.tab); setPage(h.page);
      }
    };
    window.addEventListener('popstate',onPop);
    return()=>window.removeEventListener('popstate',onPop);
  },[]);

  const ps=[];
  const s=Math.max(1,page-2), e2=Math.min(totalPg,s+4);
  for(let i=s;i<=e2;i++) ps.push(i);

  if(view==='watch'&&watching)
    return<WatchPage anime={watching} startTab={wTab} onBack={goHome}/>;
  if(view==='dmca') return<PolicyPage type="dmca" onBack={()=>{setView('home');writeHash('home',{tab,page});}}/>;
  if(view==='privacy') return<PolicyPage type="privacy" onBack={()=>{setView('home');writeHash('home',{tab,page});}}/>;

  return<>
    <nav className="nav">
      <div className="logo" onClick={goHome}>
        <div className="logo-mark"><PIco s={14}/></div>
        <div className="logo-name">just<em>stream</em>anime</div>
      </div>
      <SearchBar onSel={a=>openWatch(a,'watch')}/>
    </nav>

    {tab==='trending'&&page===1&&<Hero items={hero} onPlay={openWatch}/>}

    <div style={{paddingTop:tab==='trending'&&page===1?'0':'calc(var(--nav) + 0.5rem)'}}>
      <div className="tabs-bar">
        {TABS.map(t=><button key={t.id} className={'tbtn '+(tab===t.id?'on':'off')}
          onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>
    </div>

    <div className="section">
      <div className="sec-hdr">
        <div className="sec-bar"/>
        <h2 className="sec-title">{TABS.find(t=>t.id===tab)?.label}{page>1?` — Page ${page}`:''}</h2>
      </div>
      {loading
        ?<div className="agrid">{Array(12).fill(0).map((_,i)=><div key={i} className="sk"/>)}</div>
        :<div className="agrid">{items.map(a=><AnimeCard key={a.id} a={a} onPlay={openWatch}/>)}</div>}
    </div>

    <div className="pag">
      <button className="pgb" disabled={page===1} onClick={()=>chPg(page-1)}>‹</button>
      {ps.map(p=><button key={p} className={'pgb'+(p===page?' on':'')} onClick={()=>chPg(p)}>{p}</button>)}
      <button className="pgb" disabled={page===totalPg} onClick={()=>chPg(page+1)}>›</button>
    </div>

    <footer>
      <div className="ft-logo">just<em>stream</em>anime</div>
      <div className="ft-note"><button className="ft-link" onClick={()=>setView('dmca')}>DMCA / Copyright Policy</button>&nbsp;·&nbsp;<button className="ft-link" onClick={()=>setView('privacy')}>Privacy Policy</button></div>
    </footer>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
