<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
// Consumet public instances — we try each until one responds
const CONSUMET = [
  'https://consumet-api.onrender.com',
  'https://api.consumet.org',
  'https://consumet.netlify.app',
];
const JIKAN  = 'https://api.jikan.moe/v4';
const PROXY  = 'https://api.allorigins.win/get?url=';

// ── AniList ───────────────────────────────────────────────────────────────────
async function gql(q,v={}){
  const r=await fetch('https://graphql.anilist.co',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({query:q,variables:v})
  });
  return r.json();
}
const TQ=`query($p:Int,$pp:Int){Page(page:$p,perPage:$pp){pageInfo{lastPage}media(type:ANIME,sort:TRENDING_DESC){id idMal title{romaji english}coverImage{extraLarge large color}bannerImage description(asHtml:false)averageScore episodes seasonYear genres siteUrl}}}`;
const SQ=`query($s:String){Page(perPage:12){media(search:$s,type:ANIME){id idMal title{romaji english}coverImage{extraLarge large color}bannerImage description(asHtml:false)averageScore episodes seasonYear genres siteUrl}}}`;

function mapA(a){
  return{
    id:a.id, malId:a.idMal,
    title:a.title?.english||a.title?.romaji||'Unknown',
    romaji:a.title?.romaji||'',
    image:a.coverImage?.extraLarge||a.coverImage?.large,
    banner:a.bannerImage,
    desc:(a.description||'').replace(/<[^>]+>/g,''),
    rating:a.averageScore, year:a.seasonYear, eps:a.episodes,
    genres:a.genres||[], color:a.coverImage?.color||'#e11d48',
  };
}

// ── Jikan trailer (MAL, returns proper embeddable URL) ────────────────────────
async function getTrailer(malId){
  if(!malId) return null;
  try{
    const r=await fetch(`${JIKAN}/anime/${malId}`,{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    // Jikan returns trailer.embed_url which is youtube-nocookie embed — works without Error 153
    const embed=d?.data?.trailer?.embed_url;
    if(embed) return embed+'&autoplay=0';
    // fallback: build from youtube_id
    const ytId=d?.data?.trailer?.youtube_id;
    if(ytId) return `https://www.youtube-nocookie.com/embed/${ytId}?autoplay=0&rel=0`;
    return null;
  }catch{ return null; }
}

// ── Consumet: search gogoanime by title, returns episode IDs ──────────────────
async function gogoSearch(title){
  const slug = encodeURIComponent(title);
  for(const host of CONSUMET){
    try{
      const r=await fetch(`${host}/anime/gogoanime/${slug}`,{signal:AbortSignal.timeout(7000)});
      if(!r.ok) continue;
      const d=await r.json();
      if(d?.results?.length) return d.results;
    }catch{}
  }
  return [];
}

// ── Consumet: get episode list for a gogoanime series ID ──────────────────────
async function gogoEpisodes(gogoId){
  for(const host of CONSUMET){
    try{
      const r=await fetch(`${host}/anime/gogoanime/info/${encodeURIComponent(gogoId)}`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const d=await r.json();
      if(d?.episodes?.length) return d.episodes;
    }catch{}
  }
  return [];
}

// ── Consumet: get streaming sources for an episode ────────────────────────────
// Returns {sources:[{url,quality}], headers:{Referer}, download}
async function gogoSources(episodeId){
  for(const host of CONSUMET){
    try{
      const r=await fetch(`${host}/anime/gogoanime/watch/${encodeURIComponent(episodeId)}`,{signal:AbortSignal.timeout(10000)});
      if(!r.ok) continue;
      const d=await r.json();
      if(d?.sources?.length||d?.headers) return d;
    }catch{}
  }
  return null;
}

// ── Build embed servers from gogoanime episode data ───────────────────────────
// s3taku.com is gogoanime's actual CDN — embed directly using the episode id
function buildStreamSrcs(gogoEpId, fallbackAnimeId, ep){
  // s3taku is the vidstreaming/vidcdn backend gogoanime uses
  // encode the episode id to base64 to get the streaming id
  const encId = btoa(gogoEpId||'');
  const al = fallbackAnimeId;
  const e  = ep||1;
  return [
    // Server 1–2: s3taku (gogoanime's own CDN embed — no ads, just the player)
    `https://s3taku.com/streaming.php?id=${encodeURIComponent(gogoEpId||'')}`,
    `https://s3taku.com/embedplus?id=${encodeURIComponent(gogoEpId||'')}`,
    // Server 3: megaplay (documented AniList embed API)
    `https://megaplay.buzz/stream/ani/${al}/${e}/sub`,
    // Server 4: megaplay dub
    `https://megaplay.buzz/stream/ani/${al}/${e}/dub`,
    // Server 5–6: vidsrc (AniList-aware, no ads)
    `https://vidsrc.cc/v2/embed/anime/${al}/${e}`,
    `https://vidsrc.su/embed/anime/${al}/${e}`,
  ];
}

// ── Nyaa RSS torrent search ───────────────────────────────────────────────────
async function fetchRSS(url){
  const r=await fetch(PROXY+encodeURIComponent(url),{signal:AbortSignal.timeout(12000)});
  const d=await r.json();
  if(!d?.contents) return [];
  const xml=new DOMParser().parseFromString(d.contents,'text/xml');
  return Array.from(xml.querySelectorAll('item')).slice(0,10).map(x=>{
    const guid=x.querySelector('guid')?.textContent?.trim()||'';
    const nyaaId=guid.match(/\/view\/(\d+)/)?.[1]||'';
    const rawLink=x.querySelector('link')?.nextSibling?.textContent?.trim()
               ||x.querySelector('link')?.textContent?.trim()||'';
    return{
      name:x.querySelector('title')?.textContent?.trim()||'',
      magnet:rawLink.startsWith('magnet:')?rawLink:'',
      torrent:nyaaId?`https://nyaa.si/download/${nyaaId}.torrent`:'',
      size:x.querySelector('nyaa\\:size,[localName="size"]')?.textContent||'',
      seeds:x.querySelector('nyaa\\:seeders,[localName="seeders"]')?.textContent||'?',
    };
  }).filter(x=>x.name&&(x.torrent||x.magnet));
}

async function getTorrents(anime,ep){
  const pad=String(ep).padStart(2,'0');
  const rom=anime.romaji||anime.title;
  const queries=[
    `https://nyaa.si/?page=rss&q=${encodeURIComponent(rom+' '+pad)}&c=1_2&f=0`,
    `https://nyaa.si/?page=rss&q=${encodeURIComponent(rom+' - '+pad)}&c=1_2&f=0`,
    `https://nyaa.si/?page=rss&q=${encodeURIComponent(rom)}&c=1_2&f=0`,
    `https://nyaa.si/?page=rss&q=${encodeURIComponent(anime.title+' '+pad)}&c=1_2&f=0`,
  ];
  for(const url of queries){
    try{ const res=await fetchRSS(url); if(res.length) return res; }catch{}
  }
  return [];
}

}

// ── Hero ──────────────────────────────────────────────────────────────────────

  useEffect(()=>setLoaded(false),[a?.id]);
  if(!a)return<div style={{height:'76vh',background:'#07070f'}}/>;
  return<div className="hero">
    <img className="hi" key={a.id} src={a.banner||a.image} alt="" style={{opacity:loaded?1:0}}
      onLoad={()=>setLoaded(true)} onError={()=>setLoaded(true)}/>
    <div style={{position:'absolute',bottom:0,left:0,right:0,height:200,pointerEvents:'none',
      background:`linear-gradient(to top,${a.color}40,transparent)`}}/>
    <div className="hfb"/><div className="hft"/>
    <div className="hc">
      <div className="hg">{a.genres.slice(0,4).map(g=><GT key={g} g={g}/>)}</div>
      <h1 className="ht">{a.title}</h1>
      <div className="hm">
        <Stars s={a.rating}/>&nbsp;
        <span style={{color:'#fbbf24',fontFamily:'Space Mono,monospace',fontSize:12}}>{a.rating}%</span>
        <span>·</span><span>{a.year}</span>
        {a.eps&&<><span>·</span><span>{a.eps} eps</span></>}
      </div>
      <p className="hd">{a.desc}</p>
      <div className="hbts">
        <button className="btn-r" onClick={()=>onW(a,'watch')}><PIco s={14}/>Watch Now</button>
        <button className="btn-ghost" onClick={()=>onW(a,'trailer')}><FilmIco/> Trailer</button>
      </div>
    </div>
    <button className="harr" style={{left:16}} onClick={onPrev}>&#8249;</button>
    <button className="harr" style={{right:16}} onClick={onNext}>&#8250;</button>
    <div className="hdots">
      {Array.from({length:Math.min(total,10)}).map((_,i)=>
        <button key={i} className={'hdot'+(i===idx?' on':'')} style={{width:i===idx?22:6}}/>
      )}

}

// ── Search ────────────────────────────────────────────────────────────────────
function SearchBar({onSel}){
  const[q,setQ]=useState('');const[res,setRes]=useState([]);const[open,setOpen]=useState(false);
  const tmr=useRef(null);const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(!ref.current?.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);
  const run=useCallback(async val=>{
    if(!val.trim()){setRes([]);setOpen(false);return;}
    const d=await gql(SQ,{s:val});
    setRes((d.data?.Page?.media||[]).map(mapA));setOpen(true);
  },[]);
  const oc=e=>{setQ(e.target.value);clearTimeout(tmr.current);tmr.current=setTimeout(()=>run(e.target.value),370);};
  return<div className="sw" ref={ref}>
    <svg className="sico" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
    <input className="si" value={q} onChange={oc} placeholder="Search anime…" onFocus={()=>res.length&&setOpen(true)}/>
    {open&&res.length>0&&<div className="sdrop">
      {res.map(a=><div key={a.id} className="srow" onClick={()=>{onSel(a,'watch');setOpen(false);setQ('');}}>
        <img src={a.image} alt={a.title} onError={e=>e.target.style.display='none'}/>
        <div style={{minWidth:0}}><div className="sr-t">{a.title}</div><div className="sr-m">{a.year} · {a.eps||'?'} eps</div></div>
      </div>)}
    </div>}
  </div>;
}

// ── Watch Page ────────────────────────────────────────────────────────────────
function WatchPage({anime, startTab='watch', onBack}){
  const totalEps = anime.eps||24;
  const epList   = Array.from({length:totalEps},(_,i)=>i+1);

  const [viewTab,   setViewTab]  = useState(startTab);
  const [curEp,     setCurEp]    = useState(1);
  const [gogoId,    setGogoId]   = useState('');     // e.g. "frieren-beyond-journeys-end"
  const [gogoEpId,  setGogoEpId] = useState('');     // e.g. "frieren-beyond-journeys-end-episode-1"
  const [srcUrls,   setSrcUrls]  = useState([]);
  const [srvIdx,    setSrvIdx]   = useState(0);
  const [trailerUrl,setTrailer]  = useState('');
  const [ifKey,     setIfKey]    = useState(0);
  const [spin,      setSpin]     = useState(true);
  const [status,    setStatus]   = useState('');     // message shown under player
  const [torrents,  setTorrents] = useState([]);
  const [torLoad,   setTorLoad]  = useState(false);
  const [epFilter,  setEpFilter] = useState('');
  const [gogoEps,   setGogoEps]  = useState([]);     // full episode list from gogo

  // ── On mount: search gogo + get trailer ─────────────────────────────────────
  useEffect(()=>{
    // Get trailer from Jikan (MAL) — returns youtube-nocookie embed which works
    if(anime.malId){
      getTrailer(anime.malId).then(url=>{
        if(url) setTrailer(url);
      });
    }
    // Search gogoanime for this anime
    (async()=>{
      setStatus('Finding streams…');
      const results = await gogoSearch(anime.romaji||anime.title);
      if(!results.length){
        // Try English title
        const r2 = await gogoSearch(anime.title);
        if(!r2.length){ setStatus('No stream source found. Try another server.'); return; }
        results.push(...r2);
      }
      // Pick best match — prefer exact or sub version
      const match = results.find(r=>!r.id.includes('-dub'))||results[0];
      setGogoId(match.id);
      setStatus('Loading episodes…');
      const eps = await gogoEpisodes(match.id);
      setGogoEps(eps);
      // Load episode 1
      await loadEpFromList(eps, 1, anime.id, match.id);
    })();
  },[anime.id]);

  async function loadEpFromList(eps, epNum, animeId, gId){
    const ep  = eps.find(e=>e.number===epNum)||eps[epNum-1];
    const epId= ep?.id||`${gId||gogoId}-episode-${epNum}`;
    setGogoEpId(epId);
    setSrvIdx(0);
    setIfKey(k=>k+1);
    setSpin(true);
    setCurEp(epNum);
    // Build stream sources — s3taku first (gogoanime CDN), then fallbacks
    const srcs = buildStreamSrcs(epId, animeId||anime.id, epNum);
    setSrcUrls(srcs);
    setStatus('');
    // Torrents
    setTorLoad(true);setTorrents([]);
    getTorrents(anime,epNum).then(res=>{setTorrents(res);setTorLoad(false);});
  }

  const loadEp = useCallback(async(epNum)=>{
    await loadEpFromList(gogoEps, epNum, anime.id, gogoId);
  },[gogoEps, gogoId, anime.id]);

  const switchSrv=i=>{setSrvIdx(i);setIfKey(k=>k+1);setSpin(true);};
  const switchTab=t=>{setViewTab(t);setSpin(true);setIfKey(k=>k+1);};

  const filtered = epFilter?epList.filter(n=>String(n).includes(epFilter.trim())):epList;
  const activeSrc = viewTab==='trailer'
    ? trailerUrl
    : (srcUrls[srvIdx]||'');

  return<div className="wp">
    <nav>
      <div className="logo" onClick={onBack}>
        <div className="logo-icon"><PIco s={14}/></div>
        <span className="logo-text">just<em>stream</em>anime</span>
      </div>
    </nav>
    <button className="wb" onClick={onBack}>
      <svg viewBox="0 0 20 20" fill="currentColor" style={{width:14,height:14}}>
        <path fillRule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clipRule="evenodd"/>
      </svg>
      Back
    </button>

    <div className="wl">
      {/* LEFT */}
      <div>
        {/* TABS */}
        <div className="view-tabs">
          <button className={'vtab'+(viewTab==='watch'?' on':'')} onClick={()=>switchTab('watch')}>
            <PIco s={12}/>&nbsp; Watch
          </button>
          {trailerUrl&&<button className={'vtab'+(viewTab==='trailer'?' on':'')} onClick={()=>switchTab('trailer')}>
            <FilmIco/>&nbsp; Trailer
          </button>}
        </div>

        {/* PLAYER */}
        <div className="pw-wrap">
          {spin&&<div className="ph">
            <div className="ph-spin"/>
            <p className="ph-txt">{status||'Loading…'}</p>
          </div>}
          {activeSrc&&<iframe
            key={`${viewTab}-${ifKey}`}
            className="pif"
            src={activeSrc}
            allowFullScreen
            allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
            referrerPolicy="no-referrer"
            scrolling="no"
            onLoad={()=>{setSpin(false);setStatus('');}}
          />}
        </div>

        {/* SERVER CONTROLS — watch mode only */}
        {viewTab==='watch'&&<>
          <div className="lang-row">
            <span className="lang-lbl">Audio</span>
            <button className="lbtn on">Subbed</button>
            <button className="lbtn" onClick={()=>{setSrvIdx(3);setIfKey(k=>k+1);setSpin(true);}}>Dubbed (Srv 4)</button>
          </div>
          <div className="srv-row">
            <span className="srv-lbl">Server</span>
            {srcUrls.map((_,i)=>
              <button key={i} className={'srv-tab'+(srvIdx===i?' on':'')} onClick={()=>switchSrv(i)}>
                {i+1}
              </button>
            )}
          </div>
          {status&&<div className={'status-bar'+(status.includes('No stream')||status.includes('error')?' err':' load')}>{status}</div>}
        </>}

        {/* INFO */}
        <div className="winfo">
          <h1 className="wt">{anime.title}</h1>
          <div className="wm">
            <Stars s={anime.rating}/>&nbsp;
            <span>{anime.rating}%</span><span>·</span><span>{anime.year}</span>
            {anime.eps&&<><span>·</span><span>{anime.eps} eps</span></>}
            {viewTab==='watch'&&<span className="ep-badge">EP {curEp}</span>}
          </div>
          <div className="acgs" style={{marginBottom:10}}>{anime.genres.slice(0,5).map(g=><GT key={g} g={g}/>)}</div>
          <p className="wd">{anime.desc}</p>
        </div>

        {/* DOWNLOADS */}
        {viewTab==='watch'&&<div className="dls">
          <div className="dlh">Download — Episode {curEp}</div>
          {torLoad&&<div className="dl-spin">Finding download links…</div>}
          {!torLoad&&torrents.length===0&&<div className="dl-none">No downloads found for this episode.</div>}
          {!torLoad&&torrents.length>0&&<div className="dll">
            {torrents.map((t,i)=>{
              const q=t.name.match(/1080|720|480|360/)?.[0]||'';
              const grp=t.name.match(/^\[([^\]]+)\]/)?.[1]||'';
              return<div key={i} className="dlr">
                <div className="dl-top">
                  <div className="dl-name" title={t.name}>{t.name.replace(/\.[^.]+$/,'').slice(0,70)}</div>
                  <div className="dl-btns">
                    {t.torrent&&<a href={t.torrent} className="db dbdl" target="_blank" rel="noreferrer"><DlIco/> Download</a>}
                    {t.magnet&&t.magnet.startsWith('magnet:')&&<a href={t.magnet} className="db dbmag"><MagIco/> Magnet</a>}
                  </div>
                </div>
                <div className="dl-meta">{[grp,q&&`${q}p`,t.size,`${t.seeds} seeds`].filter(Boolean).join('  ·  ')}</div>
              </div>;
            })}
          </div>}
        </div>}
      </div>

      {/* SIDEBAR */}
      <div className="eps">
        <div className="eph">Episodes ({totalEps})</div>
        <input className="ep-filter" type="number" min="1" max={totalEps}
          placeholder="Jump to ep…" value={epFilter} onChange={e=>setEpFilter(e.target.value)}/>
        <div className="epl">
          {filtered.map(n=>
            <button key={n} className={'epb'+(curEp===n&&viewTab==='watch'?' on':'')}
              onClick={()=>{setViewTab('watch');loadEp(n);}}>
              <span className="epn">EP {n}</span>
              <span className="epna">Episode {n}</span>
            </button>
          )}
        </div>
      </div>
    </div>
  </div>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const[view,  setView] =useState('home');
  const[wa,    setWa]   =useState(null);
  const[wTab,  setWTab] =useState('watch');
  const[anime, setAnime]=useState([]);
  const[hi,    setHi]   =useState(0);
  const[page,  setPage] =useState(1);
  const[tpg,   setTpg]  =useState(1);
  const[load,  setLoad] =useState(true);
  const iv=useRef(null);

  const fetch_=useCallback(async p=>{
    setLoad(true);
    const d=await gql(TQ,{p,pp:50});
    setAnime((d.data?.Page?.media||[]).map(mapA));
    setTpg(d.data?.Page?.pageInfo?.lastPage||1);
    setHi(0);setLoad(false);
  },[]);

  useEffect(()=>{fetch_(page);},[page,fetch_]);
  useEffect(()=>{
    clearInterval(iv.current);
    if(anime.length&&view==='home')
      iv.current=setInterval(()=>setHi(i=>(i+1)%Math.min(anime.length,10)),9000);
    return()=>clearInterval(iv.current);
  },[anime,view]);

  const openW=(a,tab='watch')=>{setWa(a);setWTab(tab);setView('watch');window.scrollTo({top:0});};
  const goHome=()=>{setView('home');setWa(null);};
  const hMax=Math.min(anime.length,10);
  const ps=[];const s=Math.max(1,page-2),e2=Math.min(tpg,s+4);
  for(let i=s;i<=e2;i++)ps.push(i);
  const chPg=p=>{setPage(p);window.scrollTo({top:0,behavior:'smooth'});};

  if(view==='watch'&&wa)
    return<WatchPage anime={wa} startTab={wTab} onBack={goHome}/>;

  return<>
    <nav>
      <div className="logo" onClick={goHome}>
        <div className="logo-icon"><PIco s={14}/></div>
        <span className="logo-text">just<em>stream</em>anime</span>
      </div>
      <SearchBar onSel={openW}/>
    </nav>
    <Hero a={anime[hi]||null} onW={openW}
      onPrev={()=>setHi(i=>(i-1+hMax)%hMax)}
      onNext={()=>setHi(i=>(i+1)%hMax)}
      idx={hi} total={hMax}/>
    <section className="gs">
      <div className="gsh">
        <h2 className="gst">Trending Now</h2>
        <div className="gsl"/>
        <span className="gsp" style={{fontFamily:'Space Mono,monospace'}}>pg {page}/{tpg}</span>
      </div>
      {load
        ?<div className="agrid">{Array(20).fill(0).map((_,i)=><div key={i} className="sk"/>)}</div>
        :<div className="agrid">{anime.map(a=><ACard key={a.id} a={a} onClick={openW}/>)}</div>}
      <div className="pag">
        <button className="pb" disabled={page===1} onClick={()=>chPg(page-1)}>‹</button>
        {ps.map(p=><button key={p} className={'pb'+(p===page?' on':'')} onClick={()=>chPg(p)}>{p}</button>)}
        <button className="pb" disabled={page===tpg} onClick={()=>chPg(page+1)}>›</button>
      </div>
    </section>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
